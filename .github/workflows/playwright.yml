name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: Meteor unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Meteor installation
        uses: actions/cache@v5
        with:
          path: ~/.meteor
          key: meteor-${{ hashFiles('.meteor/release') }}-${{ hashFiles('.meteor/packages') }}
          restore-keys: meteor-

      - name: Cache Meteor build (.meteor/local)
        uses: actions/cache@v5
        with:
          path: .meteor/local
          key: meteor-local-unit-${{ hashFiles('.meteor/versions') }}
          restore-keys: meteor-local-unit-

      - name: Install Meteor
        run: |
          if [ ! -x ~/.meteor/meteor ]; then
            curl https://install.meteor.com/ | sh
          fi
          echo "$HOME/.meteor" >> "$GITHUB_PATH"

      - name: Install npm dependencies
        run: npm ci

      - name: Run Meteor unit tests
        # First Meteor build is slow; allow time before the test driver starts.
        timeout-minutes: 45
        # NOTE: do not set TEST_WATCH here. meteortesting:mocha computes
        # `testWatch: TEST_WATCH || …`, and the string '0' is truthy in JS, so
        # TEST_WATCH=0 turns ON watch mode and the process never exits — that is
        # what made this job hang until the 45-minute timeout. With TEST_WATCH
        # unset, `meteor test --once` runs the server tests and exits with the
        # correct status (matching the local rebuild-wekan.sh run).
        run: meteor test --once --driver-package meteortesting:mocha

  e2e-tests:
    name: Playwright E2E (${{ matrix.project }} ${{ matrix.shard }}/2)
    runs-on: ubuntu-24.04
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        # Playwright bundles Chromium, Firefox and WebKit builds that all run
        # headless on the Linux runner (installed per-job below with --with-deps).
        project: [chromium, firefox, webkit]
        # Split each browser's ~245 specs across 2 parallel shards (6 jobs total)
        # to cut wall-clock time. Each shard job starts its own WeKan + Mongo, so
        # there is no shared-server contention between shards. Raise the shard
        # count (here and in the --shard flag below) once the baseline is green
        # and/or once E2E runs against a prebuilt bundle (cheaper per-job startup).
        shard: [1, 2]

    services:
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Meteor installation
        uses: actions/cache@v5
        with:
          path: ~/.meteor
          key: meteor-${{ hashFiles('.meteor/release') }}-${{ hashFiles('.meteor/packages') }}
          restore-keys: meteor-

      - name: Cache Meteor build (.meteor/local)
        uses: actions/cache@v5
        with:
          path: .meteor/local
          key: meteor-local-e2e-${{ hashFiles('.meteor/versions') }}
          restore-keys: meteor-local-e2e-

      - name: Install Meteor
        run: |
          if [ ! -x ~/.meteor/meteor ]; then
            curl https://install.meteor.com/ | sh
          fi
          echo "$HOME/.meteor" >> "$GITHUB_PATH"

      - name: Install app npm dependencies
        run: npm ci

      - name: Install Playwright test dependencies
        run: npm ci
        working-directory: tests/playwright

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}
        working-directory: tests/playwright

      - name: Start WeKan in background
        run: |
          MONGO_URL=mongodb://localhost:27017/wekan_test \
          ROOT_URL=http://localhost:3000 \
          PORT=3000 \
          meteor run --settings settings.json > wekan-run.log 2>&1 &
          # The first Meteor build is slow, so wait up to 20 minutes for the
          # server to start responding before giving up.
          for i in $(seq 1 120); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "WeKan is up after $((i * 10))s"
              break
            fi
            echo "Waiting for WeKan... attempt $i/120"
            sleep 10
          done
          if ! curl -sf http://localhost:3000 > /dev/null; then
            echo "WeKan failed to start. Last 200 log lines:"
            tail -n 200 wekan-run.log
            exit 1
          fi
          # The server responding 200 only means Meteor serves HTML, not that the
          # rspack-built client JS bundle is being served yet. The tests load the
          # app in a browser; if a client chunk request returns HTML (the SPA
          # fallback) the bundle fails to parse ("Unexpected token '<'"), Meteor
          # never initialises, and every spec times out. So wait until the client
          # bundle is actually served as JavaScript before running tests.
          echo "Waiting for the rspack client bundle to be served as JavaScript..."
          CLIENT_URL="http://localhost:3000/__rspack__/client-rspack.js"
          CLIENT_READY=
          for i in $(seq 1 120); do
            FIRST=$(curl -s "$CLIENT_URL" | head -c 1)
            if [ -n "$FIRST" ] && [ "$FIRST" != "<" ]; then
              echo "Client bundle served as JS after $((i * 5))s"
              CLIENT_READY=1
              break
            fi
            echo "Client bundle not ready (attempt $i/120, first byte: '${FIRST:-<empty>}')"
            sleep 5
          done
          # Always surface the rspack/build status so we can see whether the build
          # succeeded, failed, or is just slow.
          echo "::group::rspack / client build status (wekan-run.log)"
          grep -iE "rspack|compiled|client|bundle|error|warning|HMR|8080|webpack|module not found" wekan-run.log | tail -80 || true
          echo "::endgroup::"
          if [ -z "$CLIENT_READY" ]; then
            echo "::error::Client bundle never served as JavaScript (kept returning HTML) — the browser cannot load Meteor, so all specs would time out."
            echo "Full wekan-run.log tail:"
            tail -n 250 wekan-run.log
            exit 1
          fi
        env:
          DISABLE_CAPTCHA: 'true'

      - name: Run Playwright tests (${{ matrix.project }} shard ${{ matrix.shard }}/2)
        run: |
          npx playwright test \
            --project=${{ matrix.project }} \
            --shard=${{ matrix.shard }}/2 \
            --reporter=github
        working-directory: tests/playwright
        env:
          WEKAN_BASE_URL: http://localhost:3000
          WEKAN_MONGO_URL: mongodb://localhost:27017/wekan_test
          # Make the firefox and webkit projects available to --project
          # (playwright.config.js only defines them when this is set).
          WEKAN_PLAYWRIGHT_ALL: '1'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.project }}-shard${{ matrix.shard }}
          path: tests/playwright/playwright-report/
          retention-days: 14

      - name: Upload test results (screenshots / videos)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.project }}-shard${{ matrix.shard }}
          path: tests/playwright/test-results/
          retention-days: 7

  e2e-regression:
    name: Puppeteer regression suite
    runs-on: ubuntu-24.04
    needs: unit-tests

    services:
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Meteor installation
        uses: actions/cache@v5
        with:
          path: ~/.meteor
          key: meteor-${{ hashFiles('.meteor/release') }}-${{ hashFiles('.meteor/packages') }}
          restore-keys: meteor-

      - name: Cache Meteor build (.meteor/local)
        uses: actions/cache@v5
        with:
          path: .meteor/local
          key: meteor-local-regression-${{ hashFiles('.meteor/versions') }}
          restore-keys: meteor-local-regression-

      - name: Install Meteor
        run: |
          if [ ! -x ~/.meteor/meteor ]; then
            curl https://install.meteor.com/ | sh
          fi
          echo "$HOME/.meteor" >> "$GITHUB_PATH"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Chromium
        run: sudo apt-get install -y chromium-browser

      - name: Start WeKan in background
        run: |
          MONGO_URL=mongodb://localhost:27017/wekan_regression \
          ROOT_URL=http://localhost:3000 \
          PORT=3000 \
          meteor run > wekan-run.log 2>&1 &
          # The first Meteor build is slow, so wait up to 20 minutes.
          for i in $(seq 1 120); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "WeKan is up after $((i * 10))s"
              break
            fi
            echo "Waiting for WeKan... attempt $i/120"
            sleep 10
          done
          if ! curl -sf http://localhost:3000 > /dev/null; then
            echo "WeKan failed to start. Last 200 log lines:"
            tail -n 200 wekan-run.log
            exit 1
          fi
        env:
          DISABLE_CAPTCHA: 'true'

      - name: Run list-regressions e2e
        run: node tests/e2e/list-regressions.js
        env:
          WEKAN_BASE_URL: http://localhost:3000
          WEKAN_MONGO_URL: mongodb://localhost:27017/wekan_regression
          CHROMIUM_PATH: /usr/bin/chromium-browser
          HEADLESS: 'true'
