  #          cd bcrypt && npm install --ignore-scripts && cd ..
  #          cp -a bcrypt "$BCRYPT_DIR"
  #          popd > /dev/null
  #          rm -rf "$TMP"
  #        fi
  #        # node:<version>-slim arm/v7 — same Node.js version as Meteor bundled
