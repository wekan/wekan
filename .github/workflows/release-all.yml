  # ─── 5. Build win64 bundle (rebuild native modules on Windows) ───────────────
  build-win64:
    needs: [prepare, build-amd64]
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '${{ needs.prepare.outputs.version }}'

      ## With Node 24 these are already preinstalled at GitHub Windows runners
      #- name: Install node-gyp and build tools
      #  run: |
      #    npm install -g windows-build-tools --vs2019 2>$null; exit 0

      - name: Install 7-zip
        run: choco install -y 7zip

      - name: Download amd64 bundle
        uses: actions/download-artifact@v8
        with:
          name: bundle-amd64

      - name: Fix bcrypt for Node.js 24
        shell: bash
        run: |
          7z x wekan-${VERSION}-amd64.zip
          # Fix: bcrypt 5.0.1 (Meteor accounts-password) ships node-addon-api@3
          # which fails to compile on Node.js 24. Replace with bcrypt 6.0.0.
          BCRYPT_DIR="$(pwd)/bundle/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt"
          if [ -d "$BCRYPT_DIR" ]; then
            rm -rf "$BCRYPT_DIR"
            TMP=$(mktemp -d)
            pushd "$TMP" > /dev/null
            npm pack bcrypt@6.0.0
            mkdir bcrypt && tar xzf bcrypt-*.tgz --strip-components=1 -C bcrypt
            cd bcrypt && npm install --ignore-scripts && cd ..
            cp -r bcrypt "$BCRYPT_DIR"
            popd > /dev/null
            rm -rf "$TMP"
          fi

      - name: Rebuild native modules for Windows
        shell: cmd
        run: |
          cd bundle\programs\server
          rmdir /s /q node_modules
          npm install
          cd ..\..\..

      - name: Create win64 zip
        shell: cmd
        run: 7z a wekan-%VERSION%-win64.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-win64
          path: wekan-${{ needs.prepare.outputs.version }}-win64.zip
          retention-days: 1

  # ─── 6. Create GitHub Release and upload all bundles ────────────────────────
  release:
    needs: [prepare, build-amd64, build-arm64, build-s390x, build-ppc64le, build-win64]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v8
        with:
          pattern: bundle-*
          merge-multiple: true

      - name: Create GitHub Release with all bundles
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.changelog }}
          files: |
            wekan-${{ needs.prepare.outputs.version }}-amd64.zip
            wekan-${{ needs.prepare.outputs.version }}-arm64.zip
            wekan-${{ needs.prepare.outputs.version }}-s390x.zip
            wekan-${{ needs.prepare.outputs.version }}-ppc64le.zip
            wekan-${{ needs.prepare.outputs.version }}-win64.zip
