name: Release All Platforms

# Triggered manually via GitHub CLI or the Actions UI.
# Usage:
#   gh workflow run release-all.yml -f old_version=9.35 -f new_version=9.36
#
# Or use the convenience script (bumps versions, commits, pushes, then triggers):
#   ./releases/release-all.sh 9.35 9.36
#
# WeKan's default database is MongoDB, which ships server binaries only for amd64
# and arm64 (+ the win64/mac bundles). On every OTHER architecture that has a
# Node.js 24 build — ppc64le, s390x, riscv64 — there is no MongoDB, so those
# bundles ship FerretDB v1 instead: the wekan/FerretDB fork with its embedded
# pure-Go SQLite backend, which speaks the MongoDB wire protocol. FerretDB is
# built + released SEPARATELY (wekan/FerretDB, its own build.sh) as individual
# per-arch binaries; each bundle job downloads ONLY the ferretdb-<arch> binary for
# the platform it targets and bakes it in, so amd64/arm64 users can opt into it
# too (WEKAN_DB=ferretdb, `snap set wekan
# database=ferretdb`, or Docker env). Whichever backend is chosen binds the same
# MongoDB port, so MONGO_URL is unchanged. ppc64le/s390x/riscv64 are now covered
# by the Docker image as well (self-contained, FerretDB auto-started). riscv64
# uses unofficial-builds.nodejs.org for Node 24. (armv7l/32-bit ARM is still not
# built: there is NO Node.js 24 build for it anywhere, so nothing could run it.)
#
# This workflow does EVERYTHING for a release remotely (nothing is built or
# pushed on the maintainer's machine), running jobs in parallel where possible:
#   - bump:    runs releases/version.sh + releases/rebuild-docs.sh on the runner
#              (bumps Node/MongoDB/WeKan versions, rebuilds API docs), then
#              commits and pushes the bump to wekan/wekan main
#   - prepare: tags the bumped main as v<new_version> and extracts release notes
#   - website: updates the wekan/wekan.fi repo (install page + API docs) and pushes
#   - charts:  updates and publishes the wekan/charts Helm chart and pushes,
#              only AFTER the `docker` job has published the image (skipped if
#              docker fails)
#   - build-*: builds the amd64 bundle (full Meteor 3 build), then rebuilds native
#              modules for arm64 from that amd64 base. Each bundle job downloads
#              only the ferretdb-<arch> binary it needs from the newest wekan/FerretDB
#              release (FerretDB is built + released separately by its own build.sh —
#              not compiled here) and embeds it
#   - release: creates the GitHub Release with the newest CHANGELOG.md notes and
#              uploads the core wekan-<version>-{amd64,arm64}.zip bundles
#   - build-win64 / build-mac-arm64 / build-extra-arches: built AFTER release, each
#              rebuilds the amd64 bundle's native modules for its platform (Windows,
#              macOS arm64, and QEMU-emulated ppc64le/s390x/riscv64) and attaches
#              its .zip to the Release. Windows/macOS strip the Linux FerretDB back
#              out (MongoDB-only). Decoupled from `release` so a slow/flaky build
#              never blocks it
#   - build-sandstorm: built AFTER release, builds the Sandstorm .spk package
#              (same steps as the standalone sandstorm.yml workflow, which still
#              exists for testing the .spk build on its own) and attaches
#              wekan-<version>-sandstorm.spk to the Release. Non-blocking: the
#              Sandstorm build is the experimental/fragile part of CI, so it
#              never fails the release
#   - docker:  builds and pushes the multi-arch image (amd64, arm64, ppc64le, s390x,
#              riscv64) to Docker Hub, Quay.io, GHCR
#   - snap:    builds the snap on Launchpad from the default core24 snapcraft.yaml
#              (platforms: amd64, arm64, s390x, ppc64el, riscv64), pushes it to the
#              Snap Store stable + candidate + beta + edge channels and attaches
#              the .snap files to the GitHub Release. core24 allows stable and
#              candidate (core26 does not).
#              `snap set wekan database=ferretdb` switches the running backend to
#              FerretDB v1 (snapcraft-core26.yaml is the core26 variant)
#
# Required GitHub Secrets:
#   GHCR_AUTH        - base64("username:token") for ghcr.io
#   DOCKERHUB_AUTH   - base64("username:token") for Docker Hub
#   QUAY_AUTH        - base64("username:token") for Quay.io
#   SNAP_AUTH        - Snap Store credentials (output of `snapcraft export-login`)
#   LP_CREDENTIALS   - base64 of the Launchpad credentials file used by
#                      `snapcraft remote-build` (see releases/snap-build.sh notes)
#   SANDSTORM_KEYRING - base64 of ~/.sandstorm-keyring; meteor-spk signs the .spk
#                      with the WeKan Sandstorm app's private key from this keyring
#   WEKAN_REPO_TOKEN - Personal Access Token with write access to wekan/wekan.fi
#                      and wekan/charts, used by the website + charts jobs to push
#                      to those repos (the built-in GITHUB_TOKEN only covers
#                      wekan/wekan). See releases/create-github-secrets.sh.
#                      Also needs write access to wekan/wekan-ondra,
#                      wekan/wekan-gantt-gpl, wekan/univention and wekan/nextcloud
#                      for the snap-variants / ucs / nextcloud jobs below.
#   SNAP_AUTH must also carry ACL for the variant snap names wekan-ondra and
#                      wekan-gantt-gpl (snap-variants job). See
#                      docs/Design/Autoupdate/Snap-Ondra-Gantt.md.
#   UNIVENTION_APP_PROVIDER_USER / UNIVENTION_APP_PROVIDER_PASSWORD - Univention
#                      App Provider login used by the `ucs` job to upload the UCS
#                      app. See docs/Design/Autoupdate/UCS.md.
#   NEXTCLOUD_APP_PRIVATE_KEY / NEXTCLOUD_APP_PUBLIC_CRT / NEXTCLOUD_APPSTORE_TOKEN -
#                      app signing key + certificate + App Store token used by the
#                      `nextcloud` job. See docs/Design/Autoupdate/Nextcloud.md.
#
#   The snap-variants / ucs / nextcloud jobs are guarded: if their secrets are not
#   set they log a ::notice:: and skip, so they never break an ordinary release.

on:
  workflow_dispatch:
    inputs:
      old_version:
        description: 'Previous version number (e.g. 9.35, without v prefix)'
        required: true
        type: string
      new_version:
        description: 'New version number (e.g. 9.36, without v prefix)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

# Node.js major version that Meteor 3.5 bundles. Used for native module
# rebuilds on every platform — it must match the amd64 build's Node ABI.
env:
  NODE_VERSION: '24'

jobs:

  # ─── 0. Bump versions + rebuild API docs, commit to main ────────────────────
  # Runs releases/version.sh (probes upstream for the newest Node.js/MongoDB,
  # bumps every version reference) and releases/rebuild-docs.sh (regenerates
  # public/api/wekan.yml + wekan.html), then commits and pushes to main so the
  # tag, builds, website and charts jobs all see the bumped sources.
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install version-bump and docs build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip curl wget

      - name: Bump versions and rebuild API docs
        env:
          # Builds fetch dependencies from upstream themselves, so skip the slow
          # pre-download of Node/MongoDB tarballs that the local flow does.
          RELEASE_SKIP_DEP_DOWNLOAD: '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ./releases/version.sh "${{ inputs.old_version }}" "${{ inputs.new_version }}"
          ./releases/rebuild-docs.sh "${{ inputs.new_version }}"

      - name: Commit and push version bump
        run: |
          git add --all
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "Bump versions for v${{ inputs.new_version }}"
            git push origin main
          fi

  # ─── 1. Tag the release and extract release notes ───────────────────────────
  prepare:
    needs: bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Normalise version from input
        id: version
        run: |
          VERSION="${{ inputs.new_version }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag v${{ steps.version.outputs.version }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, leaving it as is."
          else
            git tag -a "v$VERSION" -m "v$VERSION"
            git push origin "v$VERSION"
          fi

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Prefer a version-specific "# v<version> ..." section, otherwise fall
          # back to the topmost "# Upcoming/Upcomig WeKan ® release" section.
          NOTES=$(python3 - <<PYEOF
          import re, sys
          version = "$VERSION"
          with open("CHANGELOG.md", encoding="utf-8") as f:
              content = f.read()
          patterns = [
              rf"(# v{re.escape(version)} .*?)(?=\n# v[0-9]|\Z)",
              r"(# Upcom\w* WeKan.*?)(?=\n# v[0-9]|\Z)",
          ]
          for pat in patterns:
              m = re.search(pat, content, re.DOTALL)
              if m:
                  print(m.group(1).strip())
                  sys.exit(0)
          print(f"WeKan v{version}")
          PYEOF
          )
          {
            echo "content<<GHEOF"
            echo "$NOTES"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

  # ─── 1b. Update the wekan.fi website repo (parallel) ────────────────────────
  # Bumps the version/Meteor/Node/MongoDB strings on the install page and copies
  # the freshly rebuilt API docs into wekan.fi/api/v<new>, then commits + pushes
  # to wekan/wekan.fi. Runs as soon as `bump` has pushed the bumped sources.
  website:
    needs: bump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wekan repo (bumped main, with rebuilt API docs)
        uses: actions/checkout@v7
        with:
          ref: main
          path: wekan

      - name: Checkout wekan.fi website repo
        uses: actions/checkout@v7
        with:
          repository: wekan/wekan.fi
          token: ${{ secrets.WEKAN_REPO_TOKEN }}
          path: wekan.fi

      - name: Update and push website
        env:
          WEBDIR: ${{ github.workspace }}/wekan.fi
          WEKANREPODIR: ${{ github.workspace }}/wekan
          RELEASE_PUSH_WEBSITE: '1'
        run: |
          cd wekan.fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd ..
          ./wekan/releases/release-website.sh "${{ inputs.old_version }}" "${{ inputs.new_version }}"

  # ─── 1c. Update and publish the Helm chart repo (after docker) ──────────────
  # Bumps the WeKan version in wekan/charts, packages the chart and publishes it
  # to the gh-pages Helm index, then pushes both branches. Runs only AFTER the
  # `docker` job succeeds: the chart points users at the freshly published
  # multi-arch image, so we don't advertise a new chart version until that image
  # is actually on the registries. If `docker` fails, this job is skipped.
  charts:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wekan repo (for releases/release-charts.sh + version refs)
        uses: actions/checkout@v7
        with:
          ref: main
          path: wekan

      - name: Checkout wekan/charts repo (main + gh-pages)
        uses: actions/checkout@v7
        with:
          repository: wekan/charts
          token: ${{ secrets.WEKAN_REPO_TOKEN }}
          fetch-depth: 0
          path: charts

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Fetch gh-pages branch (release-charts.sh switches to it)
        run: |
          cd charts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin '+refs/heads/*:refs/remotes/origin/*'
          git branch --track gh-pages origin/gh-pages 2>/dev/null || true

      - name: Release and publish chart
        env:
          CHARTS_DIR: ${{ github.workspace }}/charts
        run: |
          ./wekan/releases/release-charts.sh "${{ inputs.new_version }}"

  # ─── 2. Build amd64 bundle (full Meteor 3 build) ────────────────────────────
  # Meteor 3.5 installer supports only Linux x86_64/aarch64, macOS, Windows.
  # The full Meteor build always runs here on x86_64; every other platform then
  # only rebuilds the native npm modules from this bundle.
  build-amd64:
    needs: [prepare]
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: refs/tags/v${{ needs.prepare.outputs.version }}

      - name: Cache Meteor installation
        uses: actions/cache@v6
        with:
          path: ~/.meteor
          key: meteor-${{ hashFiles('.meteor/release') }}-${{ hashFiles('.meteor/packages') }}
          restore-keys: meteor-

      - name: Cache npm packages
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ make python3 curl wget zip unzip qemu-user-static

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Meteor
        run: |
          if [ ! -f ~/.meteor/meteor ]; then
            curl https://install.meteor.com/ | sh
          fi
          echo "$HOME/.meteor" >> $GITHUB_PATH

      - name: Build WeKan bundle
        run: |
          rm -rf .build node_modules .meteor/local
          (meteor update --npm 2>/dev/null || true) && meteor npm install
          meteor build .build --directory

      - name: Install server npm modules
        run: |
          cd .build/bundle/programs/server
          npm install

      - name: Embed Node.js, FerretDB (amd64) and launcher into the bundle
        # Make the release .zip self-contained (offline): bundle Node.js + FerretDB
        # + a start-wekan.sh that runs WeKan on the bundled Node against the bundled
        # FerretDB (SQLite) by default, storing files on the filesystem under
        # WRITABLE_PATH. This amd64 bundle is the base every other Linux arch is
        # derived from; those jobs overwrite bundle/node and bundle/ferretdb with
        # their own arch's binaries and inherit this launcher.
        run: |
          # Bundled Node.js: the runner's node (setup-node) is linux-x64 Node 24,
          # matching this base bundle's arch.
          cp -L "$(command -v node)" .build/bundle/node
          chmod +x .build/bundle/node
          # Bundled FerretDB (amd64): download only this arch's binary from the
          # newest wekan/FerretDB release (per-arch assets, no ferretdb.zip).
          curl -fSL --retry 5 --retry-delay 10 -o .build/bundle/ferretdb \
            "https://github.com/wekan/FerretDB/releases/latest/download/ferretdb-amd64"
          chmod +x .build/bundle/ferretdb
          # Bundled MongoDB Database Tools (amd64) from wekan/mongo-tools (per-arch,
          # no mongodb.com). This base amd64 bundle is inherited by the other Linux
          # arches, which overwrite these with their own arch's tools below.
          MT="https://github.com/wekan/mongo-tools/releases/latest/download"
          for t in bsondump mongodump mongoexport mongofiles mongoimport mongorestore mongostat mongotop; do
            curl -fSL --retry 5 --retry-delay 10 -o ".build/bundle/$t" "$MT/$t-amd64"
            chmod +x ".build/bundle/$t"
          done
          # Self-contained launcher (defaults to FerretDB SQLite + WRITABLE_PATH).
          cp releases/ferretdb/start-wekan.sh .build/bundle/
          chmod +x .build/bundle/start-wekan.sh
          # #6458: cpu-exec + same-arch qemu-user. cpu-exec runs any bundled
          # binary that declares required CPU features (e.g. an external
          # MongoDB 5+: AVX on x86_64) through qemu-user emulation on CPUs
          # that lack them — including hypervisors that mask AVX. Every Linux
          # bundle ships its own arch's qemu-user; other arches overwrite
          # these below.
          cp snap-src/bin/cpu-exec .build/bundle/cpu-exec
          chmod +x .build/bundle/cpu-exec
          cp /usr/bin/qemu-x86_64-static .build/bundle/qemu-x86_64
          chmod +x .build/bundle/qemu-x86_64

      - name: Create amd64 zip
        run: |
          cd .build
          zip -r wekan-${VERSION}-amd64.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-amd64
          path: .build/wekan-${{ needs.prepare.outputs.version }}-amd64.zip
          retention-days: 1

  # ─── 3. Build arm64 bundle (rebuild native modules natively) ─────────────────
  build-arm64:
    needs: [prepare, build-amd64]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ make python3 curl unzip zip qemu-user-static

      - name: Download amd64 bundle
        uses: actions/download-artifact@v8
        with:
          name: bundle-amd64

      - name: Rebuild native modules for arm64 in container
        run: |
          unzip wekan-${VERSION}-amd64.zip
          # Fix: bcrypt 5.0.1 (Meteor accounts-password) ships node-addon-api@3
          # which fails to compile on Node.js 24. Replace with bcrypt 6.0.0.
          BCRYPT_DIR="$(pwd)/bundle/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt"
          if [ -d "$BCRYPT_DIR" ]; then
            rm -rf "$BCRYPT_DIR"
            TMP=$(mktemp -d)
            pushd "$TMP" > /dev/null
            npm pack bcrypt@6.0.0
            mkdir bcrypt && tar xzf bcrypt-*.tgz --strip-components=1 -C bcrypt
            cd bcrypt && npm install --ignore-scripts && cd ..
            cp -a bcrypt "$BCRYPT_DIR"
            popd > /dev/null
            rm -rf "$TMP"
          fi
          docker run --rm --platform linux/arm64 \
            -v "$(pwd)/bundle:/bundle" \
            -w /bundle/programs/server \
            node:${NODE_VERSION}-slim \
            sh -c "apt-get update -qq && apt-get install -y -q build-essential python3 && npm install"

      - name: Embed Node.js + FerretDB (arm64) into the bundle
        # The launcher (start-wekan.sh) is inherited from the amd64 base bundle;
        # swap bundle/node (runner is arm64 -> linux-arm64 Node 24) and bundle/ferretdb.
        run: |
          cp -L "$(command -v node)" bundle/node
          chmod +x bundle/node
          # Download only the arm64 FerretDB binary from the newest wekan/FerretDB release.
          curl -fSL --retry 5 --retry-delay 10 -o bundle/ferretdb \
            "https://github.com/wekan/FerretDB/releases/latest/download/ferretdb-arm64"
          chmod +x bundle/ferretdb
          # Overwrite the inherited amd64 MongoDB Database Tools with arm64 ones.
          MT="https://github.com/wekan/mongo-tools/releases/latest/download"
          for t in bsondump mongodump mongoexport mongofiles mongoimport mongorestore mongostat mongotop; do
            curl -fSL --retry 5 --retry-delay 10 -o "bundle/$t" "$MT/$t-arm64"
            chmod +x "bundle/$t"
          done
          # #6458: replace the inherited amd64 qemu-user with this arch's own
          # (cpu-exec is a shell script and stays as inherited). qemu-aarch64
          # lets ARMv8.0 hosts (Raspberry Pi 4 and older) run binaries that
          # need ARMv8.2-A, like MongoDB 5+.
          rm -f bundle/qemu-x86_64
          cp /usr/bin/qemu-aarch64-static bundle/qemu-aarch64
          chmod +x bundle/qemu-aarch64

      - name: Create arm64 zip
        run: |
          zip -r wekan-${VERSION}-arm64.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-arm64
          path: wekan-${{ needs.prepare.outputs.version }}-arm64.zip
          retention-days: 1

  # ─── 7. Create GitHub Release and upload all bundles ────────────────────────
  release:
    needs:
      - prepare
      - build-amd64
      - build-arm64
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v8
        with:
          pattern: bundle-*
          merge-multiple: true

      - name: Create GitHub Release with all bundles
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.changelog }}
          # FerretDB binaries are NOT attached here: the per-arch ferretdb-<arch>
          # binaries live on the wekan/FerretDB releases
          # (https://github.com/wekan/FerretDB/releases), which is where the WeKan
          # builds fetch them from. Each wekan-<version>-<arch>.zip bundle embeds
          # its own arch's FerretDB binary.
          files: |
            wekan-${{ needs.prepare.outputs.version }}-amd64.zip
            wekan-${{ needs.prepare.outputs.version }}-arm64.zip

  # ─── 7b. Extra-platform bundles (win64, mac-arm64, s390x, ppc64le) ───────────
  # Every bundle below is built AFTER `release` and attaches its own .zip to the
  # already-created GitHub Release with `gh release upload --clobber`, rather than
  # being a prerequisite of `release`. This deliberately decouples the slower /
  # different-OS builds (Windows, macOS, QEMU-emulated arches) from the core
  # amd64/arm64 release, Docker and snap, so a slow or flaky one never blocks them.
  # These bundles are NOT part of the Docker image or snap.

  # Build win64 bundle (rebuild native modules on Windows).
  build-win64:
    needs: [prepare, build-amd64, release]
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      # Checked out into src/ so start-wekan.bat and snapcraft.yaml (which pins
      # the MongoDB tools/mongosh versions) are available; the downloaded bundle
      # is extracted alongside it in the workspace root.
      - uses: actions/checkout@v7
        with:
          ref: refs/tags/v${{ needs.prepare.outputs.version }}
          path: src

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install 7-zip
        run: choco install -y 7zip

      - name: Download amd64 bundle
        uses: actions/download-artifact@v8
        with:
          name: bundle-amd64

      - name: Fix bcrypt for Node.js 24
        shell: bash
        run: |
          7z x wekan-${VERSION}-amd64.zip
          # Drop the Linux node + FerretDB binaries + MongoDB Database Tools + POSIX
          # launcher inherited from the amd64 base bundle; the Windows node.exe,
          # ferretdb.exe, *.exe tools and start-wekan.bat are added in later steps.
          rm -f bundle/node bundle/ferretdb bundle/.ferretdb-default bundle/start-wekan.sh
          rm -f bundle/bsondump bundle/mongodump bundle/mongoexport bundle/mongofiles \
                bundle/mongoimport bundle/mongorestore bundle/mongostat bundle/mongotop
          # Linux-only cpu-exec + qemu-user (#6458) make no sense on Windows.
          rm -f bundle/cpu-exec bundle/qemu-x86_64
          # Fix: bcrypt 5.0.1 (Meteor accounts-password) ships node-addon-api@3
          # which fails to compile on Node.js 24. Replace with bcrypt 6.0.0.
          BCRYPT_DIR="$(pwd)/bundle/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt"
          if [ -d "$BCRYPT_DIR" ]; then
            rm -rf "$BCRYPT_DIR"
            TMP=$(mktemp -d)
            pushd "$TMP" > /dev/null
            npm pack bcrypt@6.0.0
            mkdir bcrypt && tar xzf bcrypt-*.tgz --strip-components=1 -C bcrypt
            cd bcrypt && npm install --ignore-scripts && cd ..
            cp -r bcrypt "$BCRYPT_DIR"
            popd > /dev/null
            rm -rf "$TMP"
          fi

      - name: Rebuild native modules for Windows
        shell: bash
        run: |
          cd bundle/programs/server
          rm -rf node_modules
          npm install

      - name: Add MongoDB Database Tools to the bundle
        shell: bash
        run: |
          set -euo pipefail
          # MongoDB Database Tools (Windows) built by wekan/mongo-tools (pure Go),
          # one <tool>-win64.exe per tool from that repo's newest release — no
          # mongodb.com dependency. No mongosh: WeKan no longer bundles the MongoDB
          # Shell; scripted DB access uses the bundled Node.js 24 + `mongodb` driver.
          # (The Windows launcher, start-wekan.bat, is added by the FerretDB embed
          # step below from releases/ferretdb/start-wekan.bat.)
          BASE="https://github.com/wekan/mongo-tools/releases/latest/download"
          for tool in bsondump mongodump mongoexport mongofiles mongoimport mongorestore mongostat mongotop; do
            curl -fL --retry 5 --retry-delay 10 -o "bundle/${tool}.exe" "${BASE}/${tool}-win64.exe"
          done

          echo "=== bundle contents ==="
          ls -1 bundle/

      - name: Embed Node.js, FerretDB (win64) and launcher into the bundle
        shell: bash
        # Make the Windows .zip self-contained: bundle node.exe (from the runner's
        # win-x64 Node 24), ferretdb.exe (downloaded per-arch from the newest
        # wekan/FerretDB release) and start-wekan.bat. FerretDB embedding is
        # tolerant: if the win64 asset is missing the bundle stays MongoDB-only
        # (start-wekan.bat then won't find ferretdb.exe).
        run: |
          # Bundled Node.js (win-x64 node.exe from setup-node).
          NODE_SRC="$(command -v node)"
          [ -f "$NODE_SRC" ] || NODE_SRC="${NODE_SRC}.exe"
          cp "$NODE_SRC" bundle/node.exe
          # Bundled FerretDB (win64): download only this arch's binary.
          if curl -fSL --retry 5 --retry-delay 10 -o bundle/ferretdb.exe \
               "https://github.com/wekan/FerretDB/releases/latest/download/ferretdb-win64.exe"; then
            echo "Embedded FerretDB win64 -> bundle/ferretdb.exe"
          else
            rm -f bundle/ferretdb.exe
            echo "No win64 FerretDB asset in the release; Windows bundle stays MongoDB-only."
          fi
          # Self-contained Windows launcher (defaults to FerretDB SQLite).
          cp src/releases/ferretdb/start-wekan.bat bundle/

      - name: Create win64 zip
        shell: cmd
        run: 7z a wekan-%VERSION%-win64.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-win64
          path: wekan-${{ needs.prepare.outputs.version }}-win64.zip
          retention-days: 1

      - name: Attach win64 bundle to the GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The repo is checked out into src/, so the workspace root is not a git
          # repository; set GH_REPO so `gh` targets wekan/wekan without relying on
          # git remote detection (else: "fatal: not a git repository").
          GH_REPO: ${{ github.repository }}
        run: gh release upload "v${VERSION}" "wekan-${VERSION}-win64.zip" --clobber

  # Build mac-arm64 bundle (rebuild native modules on Apple Silicon).
  build-mac-arm64:
    needs: [prepare, build-amd64, release]
    runs-on: macos-14   # macos-14 runners are Apple Silicon (arm64)
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download amd64 bundle
        uses: actions/download-artifact@v8
        with:
          name: bundle-amd64

      - name: Rebuild native modules for macOS arm64
        run: |
          unzip -q wekan-${VERSION}-amd64.zip
          # Replace the Linux node + FerretDB binaries + MongoDB Database Tools
          # inherited from the amd64 base bundle with the macOS builds (added in a
          # later step). The POSIX launcher start-wekan.sh works on macOS, so keep it.
          rm -f bundle/node bundle/ferretdb bundle/.ferretdb-default
          # Linux-only cpu-exec + qemu-user (#6458): qemu-user does not exist for
          # macOS (Apple Silicon needs no AVX emulation anyway).
          rm -f bundle/cpu-exec bundle/qemu-x86_64
          rm -f bundle/bsondump bundle/mongodump bundle/mongoexport bundle/mongofiles \
                bundle/mongoimport bundle/mongorestore bundle/mongostat bundle/mongotop
          # Fix: bcrypt 5.0.1 (Meteor accounts-password) ships node-addon-api@3
          # which fails to compile on Node.js 24. Replace with bcrypt 6.0.0.
          BCRYPT_DIR="$(pwd)/bundle/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt"
          if [ -d "$BCRYPT_DIR" ]; then
            rm -rf "$BCRYPT_DIR"
            TMP=$(mktemp -d)
            pushd "$TMP" > /dev/null
            npm pack bcrypt@6.0.0
            mkdir bcrypt && tar xzf bcrypt-*.tgz --strip-components=1 -C bcrypt
            cd bcrypt && npm install --ignore-scripts && cd ..
            cp -a bcrypt "$BCRYPT_DIR"
            popd > /dev/null
            rm -rf "$TMP"
          fi
          cd bundle/programs/server
          rm -rf node_modules
          npm install
          cd ../../..

      - name: Embed Node.js + FerretDB (mac-arm64) into the bundle
        # Bundle the macOS arm64 Node.js (runner's darwin-arm64 Node 24) and the
        # macOS FerretDB binary, downloaded per-arch from the newest wekan/FerretDB
        # release. FerretDB is tolerant: if the mac-arm64 asset is missing the
        # bundle stays MongoDB-only (start-wekan.sh then won't find ferretdb).
        run: |
          cp -L "$(command -v node)" bundle/node
          chmod +x bundle/node
          if curl -fSL --retry 5 --retry-delay 10 -o bundle/ferretdb \
               "https://github.com/wekan/FerretDB/releases/latest/download/ferretdb-mac-arm64"; then
            chmod +x bundle/ferretdb
            echo "Embedded FerretDB mac-arm64 -> bundle/ferretdb"
          else
            rm -f bundle/ferretdb
            echo "No mac-arm64 FerretDB asset in the release; macOS bundle stays MongoDB-only."
            rm -f bundle/start-wekan.sh
          fi
          # macOS MongoDB Database Tools (mac-arm64) from wekan/mongo-tools; tolerant
          # (skip any tool not built for macOS).
          MT="https://github.com/wekan/mongo-tools/releases/latest/download"
          for t in bsondump mongodump mongoexport mongofiles mongoimport mongorestore mongostat mongotop; do
            curl -fSL --retry 5 --retry-delay 10 -o "bundle/$t" "$MT/$t-mac-arm64" \
              && chmod +x "bundle/$t" || { rm -f "bundle/$t"; echo "No $t-mac-arm64; skipping"; }
          done

      - name: Create mac-arm64 zip
        run: zip -r wekan-${VERSION}-mac-arm64.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-mac-arm64
          path: wekan-${{ needs.prepare.outputs.version }}-mac-arm64.zip
          retention-days: 1

      - name: Attach mac-arm64 bundle to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No repo checkout in this job, so set GH_REPO so `gh` knows the target
          # repository instead of trying (and failing) to detect a git remote.
          GH_REPO: ${{ github.repository }}
        run: gh release upload "v${VERSION}" "wekan-${VERSION}-mac-arm64.zip" --clobber

  # Extra-architecture Linux bundles (ppc64le, s390x, riscv64) — the arches that
  # have a Node.js 24 build but NO MongoDB server, so they ship FerretDB instead.
  # ppc64le and s390x use official nodejs.org binaries; riscv64 uses the
  # unofficial-builds.nodejs.org binary (nodejs.org ships no riscv64). armv7l
  # (32-bit ARM) is intentionally excluded: there is NO Node.js 24 build for it
  # anywhere (official or unofficial), so there is no runtime to run the bundle on
  # an armv7 device, regardless of RAM. See https://nodejs.org/dist/latest-v24.x/
  # (no -linux-armv7l) and https://unofficial-builds.nodejs.org/ (riscv64 only).
  build-extra-arches:
    needs: [prepare, build-amd64, release]
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: s390x
            platform: linux/s390x
            node_base: official
          - arch: ppc64le
            platform: linux/ppc64le
            node_base: official
          - arch: riscv64
            platform: linux/riscv64
            node_base: unofficial
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip zip

      - name: Set up QEMU for ${{ matrix.arch }} emulation
        uses: docker/setup-qemu-action@v4

      - name: Download amd64 bundle
        uses: actions/download-artifact@v8
        with:
          name: bundle-amd64

      - name: Rebuild native modules for ${{ matrix.arch }} under emulation
        run: |
          unzip -q wekan-${VERSION}-amd64.zip
          # Same bcrypt fix as the arm64 build: bcrypt 5.0.1 (Meteor
          # accounts-password) ships node-addon-api@3 which fails to compile on
          # Node.js 24. Swap in bcrypt 6.0.0 source; the emulated npm install
          # below compiles it (and any other native module) for the target arch.
          BCRYPT_DIR="$(pwd)/bundle/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt"
          if [ -d "$BCRYPT_DIR" ]; then
            rm -rf "$BCRYPT_DIR"
            TMP=$(mktemp -d)
            pushd "$TMP" > /dev/null
            npm pack bcrypt@6.0.0
            mkdir bcrypt && tar xzf bcrypt-*.tgz --strip-components=1 -C bcrypt
            cd bcrypt && npm install --ignore-scripts && cd ..
            cp -a bcrypt "$BCRYPT_DIR"
            popd > /dev/null
            rm -rf "$TMP"
          fi
          # The official node:${NODE_VERSION} Docker image only publishes amd64,
          # arm64 and ppc64le manifests — no s390x, no riscv64 — so
          # `docker run --platform linux/s390x node:24-slim` fails with "no matching
          # manifest". Instead build on an ubuntu:26.04 base (which publishes every
          # arch) and install the Node.js binary tarball inside the emulated
          # container: ppc64le/s390x from nodejs.org (official), riscv64 from
          # unofficial-builds.nodejs.org (nodejs.org ships no riscv64). Resolve the
          # exact latest ${NODE_VERSION}.x version on the host (fast, no emulation)
          # and pass it in along with which mirror to use.
          NODE_FULL=$(curl -fsSL https://nodejs.org/dist/index.json \
            | python3 -c "import json,sys; print(next(r['version'] for r in json.load(sys.stdin) if r['version'].startswith('v${NODE_VERSION}.')))")
          echo "Using Node ${NODE_FULL} (${{ matrix.node_base }}) for ${{ matrix.arch }}"
          docker run --rm --platform ${{ matrix.platform }} \
            -e NODE_FULL="$NODE_FULL" -e ARCH="${{ matrix.arch }}" \
            -e NODE_BASE="${{ matrix.node_base }}" \
            -v "$(pwd)/bundle:/bundle" \
            -w /bundle/programs/server \
            ubuntu:26.04 \
            bash -c '
              set -eux
              apt-get update -qq
              apt-get install -y -q build-essential python3 curl xz-utils ca-certificates
              if [ "$NODE_BASE" = unofficial ]; then
                NODE_URL="https://unofficial-builds.nodejs.org/download/release/${NODE_FULL}/node-${NODE_FULL}-linux-${ARCH}.tar.xz"
              else
                NODE_URL="https://nodejs.org/dist/${NODE_FULL}/node-${NODE_FULL}-linux-${ARCH}.tar.xz"
              fi
              curl -fsSL -o /tmp/node.tar.xz "$NODE_URL"
              mkdir -p /opt/node
              tar -xJf /tmp/node.tar.xz -C /opt/node --strip-components=1
              export PATH=/opt/node/bin:$PATH
              node --version
              npm install
              # Bundle the target-arch Node.js binary for the self-contained
              # launcher. /bundle is the host bundle/ dir (see -v mount above).
              cp /opt/node/bin/node /bundle/node
              chmod +x /bundle/node
              # #6458: replace the inherited amd64 qemu-user with THIS arch own
              # same-arch qemu-user (from the target-arch distro, so it runs on
              # this arch), used by bundle/cpu-exec to emulate CPU features a
              # binary needs but the host CPU lacks. Tolerant: if the package
              # is unavailable on this arch, the bundle just ships without it
              # (cpu-exec then falls back to a system qemu-user, or reports).
              rm -f /bundle/qemu-x86_64
              if apt-get install -y -q qemu-user-static >/dev/null 2>&1 && \
                 [ -x "/usr/bin/qemu-$(uname -m)-static" ]; then
                cp "/usr/bin/qemu-$(uname -m)-static" "/bundle/qemu-$(uname -m)"
                chmod +x "/bundle/qemu-$(uname -m)"
                echo "Bundled qemu-$(uname -m) for cpu-exec."
              else
                echo "qemu-user-static not available for $(uname -m); bundle ships without a bundled qemu-user."
              fi
            '

      - name: Embed FerretDB (${{ matrix.arch }}) into the bundle
        # These arches have no MongoDB server, so FerretDB is their default DB.
        # The launcher (start-wekan.sh) is inherited from the amd64 base bundle;
        # download only this arch's binary from the newest wekan/FerretDB release.
        # A marker file makes FerretDB the default backend at runtime (see the
        # launcher + Docker entrypoint).
        run: |
          curl -fSL --retry 5 --retry-delay 10 -o bundle/ferretdb \
            "https://github.com/wekan/FerretDB/releases/latest/download/ferretdb-${{ matrix.arch }}"
          chmod +x bundle/ferretdb
          # Overwrite the inherited amd64 MongoDB Database Tools with this arch's ones.
          MT="https://github.com/wekan/mongo-tools/releases/latest/download"
          for t in bsondump mongodump mongoexport mongofiles mongoimport mongorestore mongostat mongotop; do
            curl -fSL --retry 5 --retry-delay 10 -o "bundle/$t" "$MT/$t-${{ matrix.arch }}"
            chmod +x "bundle/$t"
          done
          touch bundle/.ferretdb-default

      - name: Create ${{ matrix.arch }} zip
        run: zip -r wekan-${VERSION}-${{ matrix.arch }}.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.arch }}
          path: wekan-${{ needs.prepare.outputs.version }}-${{ matrix.arch }}.zip
          retention-days: 1

      - name: Attach ${{ matrix.arch }} bundle to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No repo checkout in this job, so set GH_REPO so `gh` knows the target
          # repository instead of trying (and failing) to detect a git remote.
          GH_REPO: ${{ github.repository }}
        run: gh release upload "v${VERSION}" "wekan-${VERSION}-${{ matrix.arch }}.zip" --clobber

  # ─── 7c. Build the Sandstorm .spk and attach it to the Release ───────────────
  # Same steps as the standalone sandstorm.yml workflow (kept for building/testing
  # the .spk on its own without a full release); here it builds from the release
  # tag and attaches wekan-<version>-sandstorm.spk to the GitHub Release.
  #
  # EXPERIMENTAL in CI (same caveats as sandstorm.yml):
  #   * Sandstorm needs unprivileged user namespaces; GitHub's Ubuntu runners are VMs
  #     that allow them, but this is the fragile part.
  #   * meteor-spk SIGNS the .spk with the app private key from the Sandstorm keyring;
  #     provide it as the SANDSTORM_KEYRING secret (base64 of ~/.sandstorm-keyring).
  #
  # continue-on-error: the experimental Sandstorm build must NOT fail the release;
  # like the other post-`release` bundle jobs it only attaches its artifact.
  build-sandstorm:
    needs: [prepare, release]
    continue-on-error: true
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: refs/tags/v${{ needs.prepare.outputs.version }}

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable unprivileged user namespaces (Ubuntu 24.04 restricts them)
        # Ubuntu 24.04's AppArmor defaults kernel.apparmor_restrict_unprivileged_userns=1,
        # which blocks the unprivileged user namespaces that the Sandstorm install and
        # the spk supervisor rely on (the "fragile part" noted above). Relax it so
        # `install.sandstorm.io` and meteor-spk can create sandboxes on the runner.
        # `|| true`: on kernels/runners without these knobs, setting them is a no-op.
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true

      - name: Install system dependencies and Meteor
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full wget curl build-essential g++ make python3 unzip xz-utils git qemu-user-static
          if [ ! -f "$HOME/.meteor/meteor" ]; then curl https://install.meteor.com/ | sh; fi
          echo "$HOME/.meteor" >> "$GITHUB_PATH"

      - name: Install Sandstorm (dev, unattended)
        # Installed BEFORE assembling the deps: build-deps.sh's [bridge] step copies
        # the modern /opt/sandstorm/latest/bin/sandstorm-http-bridge over the ancient
        # bundled one, so the Sandstorm install must be in place first.
        run: curl https://install.sandstorm.io | sudo bash -s -- -d

      - name: Assemble modern meteor-spk.deps (Node 24 + FerretDB + Mongo 3.x CLIs)
        # Base = upstream meteor-spk 0.6.0 from dl.sandstorm.io (has mongod 3.0 +
        # niscud). build-deps.sh swaps in Node 24, adds FerretDB + the Mongo 3.x
        # CLIs + the migration launcher/importer, keeps niscud, and swaps in the
        # modern sandstorm-http-bridge from the Sandstorm install above. No dependency
        # on the retired releases.wekan.team or the old projects.7z.
        run: |
          bash sandstorm-src/build-deps.sh
          echo "$HOME/projects/meteor-spk/meteor-spk-0.6.0" >> "$GITHUB_PATH"

      - name: Restore the Sandstorm signing keyring
        env:
          SANDSTORM_KEYRING: ${{ secrets.SANDSTORM_KEYRING }}
        run: |
          if [ -n "${SANDSTORM_KEYRING:-}" ]; then
            # meteor-spk / spk read the app signing key from ~/.sandstorm-keyring —
            # a FILE directly in $HOME (see the pack crash path
            # "/home/runner/.sandstorm-keyring"). Write it exactly there, NOT to
            # ~/.sandstorm/sandstorm-keyring, or `meteor-spk pack` aborts with
            # "open(~/.sandstorm-keyring): No such file or directory".
            printf '%s' "$SANDSTORM_KEYRING" | base64 -d > "$HOME/.sandstorm-keyring"
            chmod 600 "$HOME/.sandstorm-keyring"
            echo "Restored ~/.sandstorm-keyring ($(wc -c < "$HOME/.sandstorm-keyring") bytes)."
          else
            echo "::error::SANDSTORM_KEYRING secret is not set. meteor-spk pack signs the .spk with the WeKan Sandstorm app's private key, which lives in this keyring, so packing cannot proceed without it. Add the base64 of your ~/.sandstorm-keyring file as the SANDSTORM_KEYRING repository secret (e.g. 'base64 -w0 ~/.sandstorm-keyring')."
            exit 1
          fi

      - name: Install Meteor npm dependencies
        # PUPPETEER_SKIP_DOWNLOAD: puppeteer is a devDependency used only by tests,
        # not by the server, so it never belongs in the packed .spk. Skipping its
        # Chromium download (~150 MB) avoids any risk of it bloating the build and
        # speeds up CI.
        env:
          PUPPETEER_SKIP_DOWNLOAD: '1'
        run: |
          (meteor update --npm 2>/dev/null || true) && meteor npm install

      - name: Build the Sandstorm .spk
        id: build
        env:
          PUPPETEER_SKIP_DOWNLOAD: '1'
        run: |
          set -euo pipefail
          # Version-named (not timestamped like sandstorm.yml): the release re-runs
          # idempotently with --clobber replacing the same asset.
          SPK="wekan-${VERSION}-sandstorm.spk"
          meteor-spk pack "$SPK"
          # Report the packed size and warn if it exceeds Cloudflare's 100 MB upload
          # cap (a proxied browser upload to a Cloudflare-fronted Sandstorm 413s above
          # this; install via a DNS-only host / SSH tunnel, or trim further).
          SPK_BYTES=$(stat -c%s "$SPK")
          echo "Packed $SPK: $((SPK_BYTES/1024/1024)) MiB ($SPK_BYTES bytes)"
          if [ "$SPK_BYTES" -gt $((100*1024*1024)) ]; then
            echo "::warning::$SPK is $((SPK_BYTES/1024/1024)) MiB — over Cloudflare's 100 MB upload limit. Upload via a DNS-only host / SSH tunnel to Sandstorm, or trim the bundle further."
          fi
          ls -la "$SPK"
          echo "spk=$SPK" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build.outputs.spk }}
          path: ${{ steps.build.outputs.spk }}
          retention-days: 7

      - name: Attach the .spk to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${VERSION}" "${{ steps.build.outputs.spk }}" --clobber

  # ─── 8. Build and push the multi-arch Docker image to all registries ────────
  # Mirrors releases/docker-build.sh step 3 (multi-arch buildx --push).
  # Needs `release` because the Dockerfile downloads wekan-<version>-<arch>.zip
  # from the GitHub Release; building before those assets exist 404s and (without
  # set -e in the Dockerfile) shipped a broken image missing /build/main.js. Also
  # needs `build-extra-arches` because the image now covers ppc64le/s390x/riscv64,
  # whose zips (with FerretDB baked in) are attached by that job after `release`.
  docker:
    needs: [prepare, release, build-extra-arches]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: refs/tags/v${{ needs.prepare.outputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub, Quay.io and GHCR
        env:
          DOCKERHUB_AUTH: ${{ secrets.DOCKERHUB_AUTH }}
          QUAY_AUTH: ${{ secrets.QUAY_AUTH }}
          GHCR_AUTH: ${{ secrets.GHCR_AUTH }}
        run: |
          login() {
            # $1 = registry host, $2 = base64("user:token")
            local host="$1" creds user token
            creds="$(printf '%s' "$2" | base64 -d)"
            user="${creds%%:*}"
            token="${creds#*:}"
            printf '%s' "$token" | docker login "$host" -u "$user" --password-stdin
          }
          login docker.io "$DOCKERHUB_AUTH"
          login quay.io   "$QUAY_AUTH"
          login ghcr.io   "$GHCR_AUTH"

      - name: Wait for release bundles to be downloadable
        # The Dockerfile downloads wekan-<version>-<arch>.zip from the GitHub
        # Release for each built platform. Even though this job needs `release`
        # (so the assets are uploaded), GitHub's releases/download/<tag>/<asset>
        # URL can briefly 404 right after upload (CDN/propagation lag), which used
        # to fail the multi-arch build mid-way. Poll here until every arch bundle
        # baked into the image returns 200, so the (expensive, emulated) buildx run
        # only starts once the assets are actually fetchable. The Dockerfile also
        # retries per-arch as a second layer of safety.
        run: |
          set -euo pipefail
          base="https://github.com/wekan/wekan/releases/download/v${VERSION}"
          for arch in amd64 arm64 ppc64le s390x riscv64; do
            url="${base}/wekan-${VERSION}-${arch}.zip"
            echo "Waiting for ${url} ..."
            ok=0
            for i in $(seq 1 30); do
              code=$(curl -sSL -o /dev/null -w '%{http_code}' --retry 0 -I "$url" || echo 000)
              if [ "$code" = "200" ]; then
                echo "  available (HTTP $code) after $((i*10))s"
                ok=1
                break
              fi
              echo "  attempt $i/30: HTTP $code, retrying in 10s..."
              sleep 10
            done
            if [ "$ok" -ne 1 ]; then
              echo "::error::Release asset not downloadable after retries: $url"
              exit 1
            fi
          done

      - name: Verify the release bundle reports the release version
        # Belt-and-suspenders against the "image tagged vX shows vY in the Admin
        # Panel" bug: the image is just the unzipped wekan-<version>-<arch>.zip
        # bundle (Dockerfile moves it to /build), and the Admin Panel shows that
        # bundle's WeKan version (server/statistics.js reads
        # require('/package.json').version). Check the amd64 bundle's WeKan version
        # equals the release version BEFORE the expensive multi-arch buildx, so a
        # stale/mismatched bundle fails fast instead of shipping (and pushing to
        # three registries) a mislabeled image.
        #
        # Meteor does NOT ship the app package.json as a standalone file — it
        # inlines it into the compiled bundle/programs/server/app/app.js as a JSON
        # module, e.g. {"name":"wekan","version":"v9.63.0",...}. That inlined
        # module (anchored on "name":"wekan") is exactly what require('/package.json')
        # resolves to at runtime, so it is the authoritative thing to check.
        #
        # IMPORTANT: only a CONFIRMED mismatch fails the release. If the version
        # cannot be located (bundle layout changed, app.js minified differently),
        # warn and continue — inability to verify must not block a good release,
        # since --build-arg VERSION below is the actual guarantee. (An earlier
        # version of this guard grepped for a v-prefixed *package.json* and made
        # "not found" fatal, which false-failed the whole v9.63 docker build.)
        run: |
          set -euo pipefail
          url="https://github.com/wekan/wekan/releases/download/v${VERSION}/wekan-${VERSION}-amd64.zip"
          wget -q "$url" -O bundle.zip
          tmp="$(mktemp -d)"
          # Extract only the compiled app program (not the whole multi-hundred-MB
          # bundle); the inlined app package.json lives in app/app.js.
          unzip -o -q bundle.zip 'bundle/programs/server/app/app.js' -d "$tmp" || true
          appjs="$tmp/bundle/programs/server/app/app.js"
          found=""
          if [ -f "$appjs" ]; then
            match="$(grep -aoE '"name":"wekan","version":"v?[0-9][^"]*"' "$appjs" | head -1 || true)"
            found="$(printf '%s' "$match" | sed -E 's/.*"version":"([^"]*)".*/\1/')"
          fi
          rm -rf "$tmp" bundle.zip
          if [ -z "$found" ]; then
            echo "::warning::Could not locate the WeKan version in the bundle (app.js layout may have changed); skipping the bundle-version check. --build-arg VERSION still guarantees the correct bundle."
            exit 0
          fi
          norm="${found#v}"
          if [ "$norm" != "${VERSION}.0" ] && [ "$norm" != "${VERSION}" ]; then
            echo "::error::Bundle reports app version ${found} but the release is v${VERSION}. The bundle baked into the image is stale/mismatched — the Admin Panel would show ${norm}. Aborting before build."
            exit 1
          fi
          echo "Bundle app version ${found} matches release v${VERSION}."

      - name: Build and push multi-arch image
        # Pass VERSION explicitly as a build-arg. The Dockerfile's `ARG VERSION`
        # default is only a fallback for manual builds; the release version is the
        # authoritative source here. Without this the image would build against the
        # Dockerfile default (downloading that version's wekan-<v>-<arch>.zip and
        # baking its package.json), so a v${VERSION}-tagged image could ship — and
        # report in the Admin Panel — a stale, different version.
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/ppc64le,linux/s390x,linux/riscv64 \
            --build-arg VERSION=${VERSION} \
            -t wekanteam/wekan:v${VERSION} \
            -t wekanteam/wekan:latest \
            -t quay.io/wekan/wekan:v${VERSION} \
            -t quay.io/wekan/wekan:latest \
            -t ghcr.io/wekan/wekan:v${VERSION} \
            -t ghcr.io/wekan/wekan:latest \
            --push \
            .

  # ─── 9. Build the snap on Launchpad, push to the store, attach to release ────
  # The snap's `wekan` part downloads wekan-<version>-<arch>.zip from the GitHub
  # Release, so these jobs run only after `release` has published those assets.
  #
  # snap-native + snap-launchpad replace the old single `snap` job. The mainstream
  # arches (amd64 + arm64) build NATIVELY on GitHub-hosted runners — fast, no
  # Launchpad queue. The exotic arches (s390x, ppc64el, riscv64) have no native
  # GitHub runners and snapcraft cannot cross-build, so they stay on Launchpad but
  # in a NON-BLOCKING, per-arch matrix so a slow/failed arch (riscv64 queues for
  # hours) never holds up the release or the other arches. Each arch publishes to
  # the Snap Store (stable + candidate + beta + edge) and attaches to the Release the moment
  # it finishes — all 5 arches, published independently.
  snap-native:
    needs: [prepare, release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: refs/tags/v${{ needs.prepare.outputs.version }}

      - name: Verify snapcraft.yaml version matches the release
        # snapcraft.yaml's `version:` names the produced file (wekan_<version>_<arch>.snap).
        # Assert it matches the tag so a stale version fails fast here.
        run: |
          set -euo pipefail
          if ! grep -qxF "version: '${VERSION}'" snapcraft.yaml; then
            echo "::error::snapcraft.yaml is not at version '${VERSION}' ($(grep -m1 '^version:' snapcraft.yaml)). The bump job (releases/version.sh) did not update the tagged commit."
            exit 1
          fi
          echo "snapcraft.yaml is at version '${VERSION}'."

      - name: Build the ${{ matrix.arch }} snap natively
        # Runs on a native ${{ matrix.arch }} GitHub runner, so snapcraft builds the
        # platform whose `build-on` matches this host — no Launchpad, no emulation.
        id: build
        uses: snapcore/action-build@v1

      - name: Verify the built snap is ${{ matrix.arch }}
        run: |
          set -euo pipefail
          snap="${{ steps.build.outputs.snap }}"
          echo "Built: $snap"
          case "$snap" in
            *_${{ matrix.arch }}.snap) : ;;
            *) echo "::error::Built snap '$snap' is not ${{ matrix.arch }}."; exit 1 ;;
          esac

      - name: Push ${{ matrix.arch }} to the Snap Store (stable + candidate + beta + edge)
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_AUTH }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable,candidate,beta,edge

      - name: Attach the ${{ matrix.arch }} snap to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${VERSION}" "${{ steps.build.outputs.snap }}" --clobber

  # ─── 9b. Build the QEMU-emulated exotic arches on GitHub runners ─────────────
  # ppc64el and s390x have no native GitHub runners, but they build cleanly under
  # QEMU emulation on a normal amd64 runner: the snap is bundle-centric (the wekan
  # part just downloads the prebuilt wekan-<version>-<arch>.zip and repackages it),
  # so there is no slow native compilation and the emulated build is fast. This
  # REPLACES the old Launchpad remote-build legs for these two arches, which ended
  # in Launchpad state "Stopped" with no snap and then failed at `snapcraft upload`
  # ("is not a valid file", exit 64). riscv64 stays on Launchpad (snap-launchpad
  # below) because the QEMU snap action does not support it.
  # continue-on-error + fail-fast:false so one arch never blocks the release or the
  # others; each leg publishes the moment it finishes.
  snap-qemu:
    needs: [prepare, release]
    continue-on-error: true
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        arch: [ppc64el, s390x]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: refs/tags/v${{ needs.prepare.outputs.version }}

      - name: Verify snapcraft.yaml version matches the release
        run: |
          set -euo pipefail
          if ! grep -qxF "version: '${VERSION}'" snapcraft.yaml; then
            echo "::error::snapcraft.yaml is not at version '${VERSION}' ($(grep -m1 '^version:' snapcraft.yaml)). The bump job (releases/version.sh) did not update the tagged commit."
            exit 1
          fi
          echo "snapcraft.yaml is at version '${VERSION}'."

      - name: Set up QEMU for ${{ matrix.arch }} emulation
        uses: docker/setup-qemu-action@v4

      - name: Build the ${{ matrix.arch }} snap under QEMU
        # Runs snapcraft inside a ${{ matrix.arch }} container via QEMU; snapcraft
        # sees build-on: ${{ matrix.arch }} in snapcraft.yaml and builds that
        # platform. Outputs the built .snap path as steps.build.outputs.snap.
        id: build
        uses: diddlesnaps/snapcraft-multiarch-action@v1
        with:
          architecture: ${{ matrix.arch }}

      - name: Verify the built snap is ${{ matrix.arch }}
        run: |
          set -euo pipefail
          snap="${{ steps.build.outputs.snap }}"
          echo "Built: $snap"
          case "$snap" in
            *_${{ matrix.arch }}.snap) : ;;
            *) echo "::error::Built snap '$snap' is not ${{ matrix.arch }}."; exit 1 ;;
          esac

      - name: Push ${{ matrix.arch }} to the Snap Store (stable + candidate + beta + edge)
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_AUTH }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable,candidate,beta,edge

      - name: Attach the ${{ matrix.arch }} snap to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${VERSION}" "${{ steps.build.outputs.snap }}" --clobber

  snap-launchpad:
    needs: [prepare, release]
    # riscv64 ONLY: it has no native GitHub runner and the QEMU snap action
    # (diddlesnaps/snapcraft-multiarch-action) does not support riscv64, so it stays
    # on Launchpad remote-build. ppc64el and s390x moved to snap-qemu above.
    # continue-on-error: the exotic Launchpad arch must NOT hold up or fail the
    # release. riscv64 queues for hours / can time out; that must not turn the whole
    # release red. timeout-minutes bounds a stuck build so it fails with a clear
    # message instead of GitHub's silent 6h cancel.
    continue-on-error: true
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        arch: [riscv64]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: refs/tags/v${{ needs.prepare.outputs.version }}
          # remote-build (Launchpad) rejects shallow clones, so fetch full history
          fetch-depth: 0

      - name: Install snapcraft
        # The Snap Store intermittently rejects the install with a 429-style rate
        # limit; retry so one transient throttle does not fail the build.
        run: |
          set -uo pipefail
          for i in 1 2 3 4 5; do
            sudo snap install snapcraft --classic && exit 0
            echo "snapcraft install attempt $i/5 failed (Snap Store throttle?); retrying in 30s..."
            sleep 30
          done
          echo "::error::snapcraft install failed after 5 attempts (Snap Store rate limit)."
          exit 1

      - name: Provide Launchpad credentials for remote-build
        env:
          LP_CREDENTIALS: ${{ secrets.LP_CREDENTIALS }}
        run: |
          mkdir -p ~/.local/share/snapcraft
          printf '%s' "$LP_CREDENTIALS" | base64 -d > ~/.local/share/snapcraft/launchpad-credentials
          chmod 600 ~/.local/share/snapcraft/launchpad-credentials

      - name: Verify snapcraft.yaml version matches the release
        run: |
          set -euo pipefail
          if ! grep -qxF "version: '${VERSION}'" snapcraft.yaml; then
            echo "::error::snapcraft.yaml is not at version '${VERSION}' ($(grep -m1 '^version:' snapcraft.yaml)). The bump job (releases/version.sh) did not update the tagged commit."
            exit 1
          fi
          echo "snapcraft.yaml is at version '${VERSION}'."

      - name: Build the ${{ matrix.arch }} snap on Launchpad
        # --build-for ${{ matrix.arch }}: build ONLY this leg's arch so a slow/failed
        # arch never blocks the others. remote-build can exit 0 without producing a
        # .snap (it just downloads logs), so require the file. Retry a few times to
        # survive transient TLS drops to Launchpad.
        run: |
          set -uo pipefail
          shopt -s nullglob
          attempts=3
          for i in $(seq 1 "$attempts"); do
            echo "::group::Remote build ${{ matrix.arch }} attempt $i/$attempts"
            snapcraft remote-build --launchpad-accept-public-upload \
              --build-for ${{ matrix.arch }} && rc=0 || rc=$?
            echo "::endgroup::"
            snaps=( wekan_${VERSION}_${{ matrix.arch }}.snap )
            if [ "$rc" -eq 0 ] && [ "${#snaps[@]}" -gt 0 ]; then
              echo "Remote build ${{ matrix.arch }} succeeded on attempt $i: ${snaps[*]}"
              exit 0
            fi
            echo "Attempt $i: snapcraft exit=$rc, .snap files produced=${#snaps[@]}."
            for log in snapcraft-wekan-*.txt; do
              echo "::group::Launchpad build log: $log (last 150 lines)"
              tail -n 150 "$log"
              echo "::endgroup::"
            done
            if [ "$i" -lt "$attempts" ]; then
              echo "Retrying in 60s..."
              sleep 60
            fi
          done
          echo "::error::Remote build ${{ matrix.arch }} failed after $attempts attempts (no wekan_${VERSION}_${{ matrix.arch }}.snap produced)." >&2
          exit 1

      - name: Push ${{ matrix.arch }} to the Snap Store (stable + candidate + beta + edge)
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_AUTH }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          snaps=( wekan_${VERSION}_${{ matrix.arch }}.snap )
          if [ "${#snaps[@]}" -eq 0 ]; then
            echo "::error::No wekan_${VERSION}_${{ matrix.arch }}.snap to upload."
            exit 1
          fi
          # base: core24 allows publishing to stable and candidate (core26 does not).
          for f in "${snaps[@]}"; do
            echo "Uploading $f to the Snap Store (stable,candidate,beta,edge)..."
            snapcraft upload --release=stable,candidate,beta,edge "$f"
          done

      - name: Attach the ${{ matrix.arch }} snap to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          snaps=( wekan_${VERSION}_${{ matrix.arch }}.snap )
          if [ "${#snaps[@]}" -gt 0 ]; then
            gh release upload "v${VERSION}" "${snaps[@]}" --clobber
          fi

  # ─── Variant snaps: wekan-ondra, wekan-gantt-gpl ────────────────────────────
  # Publish two extra snaps that are the newest wekan code under a different snap
  # name. DORMANT until SNAP_AUTH carries ACL for the variant names and
  # WEKAN_REPO_TOKEN can push to the variant repos.
  # See docs/Design/Autoupdate/Snap-Ondra-Gantt.md.
  snap-variants:
    needs: [prepare, release]
    continue-on-error: true
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: wekan-ondra
            snapname: wekan-ondra
            title: "Wekan Ondra"
          - repo: wekan-gantt-gpl
            snapname: wekan-gantt-gpl
            title: "Wekan Gantt GPL"
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Check required secrets are configured
        id: guard
        env:
          REPO_TOKEN: ${{ secrets.WEKAN_REPO_TOKEN }}
          SNAP_AUTH: ${{ secrets.SNAP_AUTH }}
        run: |
          if [ -z "$REPO_TOKEN" ] || [ -z "$SNAP_AUTH" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::snap-variants (${{ matrix.snapname }}) skipped — set WEKAN_REPO_TOKEN and SNAP_AUTH (with ACL for ${{ matrix.snapname }}). See docs/Design/Autoupdate/Snap-Ondra-Gantt.md."
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout wekan at the release tag
        if: steps.guard.outputs.ok == 'true'
        uses: actions/checkout@v7
        with:
          ref: refs/tags/v${{ needs.prepare.outputs.version }}
          path: wekan

      - name: Sync wekan into ${{ matrix.repo }} and set the snap name
        if: steps.guard.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.WEKAN_REPO_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/wekan/${{ matrix.repo }}.git" variant
          rsync -a --delete --exclude='.git' wekan/ variant/
          cd variant
          sed -i "s/^name: wekan$/name: ${{ matrix.snapname }}/" snapcraft.yaml
          sed -i "s/^title: .*/title: ${{ matrix.title }}/" snapcraft.yaml
          git config user.name  'wekan-release-bot'
          git config user.email 'release@wekan.team'
          git add -A
          git commit -m "Sync wekan v${VERSION} as ${{ matrix.snapname }}" || echo "no changes"
          git tag -f "v${VERSION}"
          git push origin HEAD:main
          git push -f origin "v${VERSION}"

      - name: Build the ${{ matrix.snapname }} snap
        id: build
        if: steps.guard.outputs.ok == 'true'
        uses: snapcore/action-build@v1
        with:
          path: variant

      - name: Publish ${{ matrix.snapname }} to the Snap Store (all channels)
        if: steps.guard.outputs.ok == 'true'
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_AUTH }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable,candidate,beta,edge

  # ─── UCS App Center (Univention) ────────────────────────────────────────────
  # Regenerate the wekan/univention app for the new version and upload it to the
  # Univention App Provider. DORMANT until the App Provider secrets are set and
  # WEKAN_REPO_TOKEN can push to wekan/univention. The MongoDB 3.x -> FerretDB
  # SQLite switch + migration hook is a larger change tracked in the doc; this job
  # bumps the version and uploads so the pipeline is wired.
  # See docs/Design/Autoupdate/UCS.md.
  ucs:
    needs: [prepare, release, docker]
    continue-on-error: true
    timeout-minutes: 45
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Check required secrets are configured
        id: guard
        env:
          REPO_TOKEN: ${{ secrets.WEKAN_REPO_TOKEN }}
          UCS_USER: ${{ secrets.UNIVENTION_APP_PROVIDER_USER }}
          UCS_PASS: ${{ secrets.UNIVENTION_APP_PROVIDER_PASSWORD }}
        run: |
          if [ -z "$REPO_TOKEN" ] || [ -z "$UCS_USER" ] || [ -z "$UCS_PASS" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ucs skipped — set WEKAN_REPO_TOKEN, UNIVENTION_APP_PROVIDER_USER, UNIVENTION_APP_PROVIDER_PASSWORD. See docs/Design/Autoupdate/UCS.md."
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout the wekan/univention app repo
        if: steps.guard.outputs.ok == 'true'
        uses: actions/checkout@v7
        with:
          repository: wekan/univention
          token: ${{ secrets.WEKAN_REPO_TOKEN }}
          path: univention

      - name: Update the app to WeKan ${{ needs.prepare.outputs.version }}
        if: steps.guard.outputs.ok == 'true'
        run: |
          set -euo pipefail
          cd univention
          # Bump the WeKan image tag in the compose (image is mirrored by the App
          # Provider from the public wekanteam/wekan image). The FerretDB compose +
          # migration hook is the larger change from docs/Design/Autoupdate/UCS.md.
          sed -i "s#\(wekan-wekan:\)[^ ]*#\1${VERSION}#g" component/compose || true
          git config user.name  'wekan-release-bot'
          git config user.email 'release@wekan.team'
          git add -A
          git commit -m "WeKan ${VERSION} for UCS" || echo "no changes"
          git push origin HEAD:master

      - name: Upload the app to the Univention App Provider
        if: steps.guard.outputs.ok == 'true'
        env:
          UNIVENTION_APPCENTER_USER: ${{ secrets.UNIVENTION_APP_PROVIDER_USER }}
          UNIVENTION_APPCENTER_PASSWORD: ${{ secrets.UNIVENTION_APP_PROVIDER_PASSWORD }}
        run: |
          set -euo pipefail
          # univention-appcenter-control is the App Provider CLI. Fetch it and
          # upload the app metadata/component. The exact app-version id and file
          # arguments depend on the App Provider account — see UCS.md.
          if ! curl -fsSL -o univention-appcenter-control \
                https://provider-portal.software-univention.de/appcenter-selfservice/univention-appcenter-control; then
            echo "::warning::Could not fetch univention-appcenter-control; upload skipped (fill in per account)."
            exit 0
          fi
          chmod +x univention-appcenter-control
          echo "Fetched univention-appcenter-control. Intended upload:"
          echo "  ./univention-appcenter-control upload \"wekan_${VERSION}\" univention/meta/* univention/component/*"
          # ./univention-appcenter-control upload "wekan_${VERSION}" univention/meta/* univention/component/* \
          #   || echo "::warning::App Provider upload failed (check account/app id)."

  # ─── Nextcloud App Store (ExApp) ────────────────────────────────────────────
  # Build the WeKan ExApp image and publish the app to apps.nextcloud.com.
  # DORMANT until the ExApp repo (wekan/nextcloud) and the signing/App Store
  # secrets exist. See docs/Design/Autoupdate/Nextcloud.md.
  nextcloud:
    needs: [prepare, release, docker]
    continue-on-error: true
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Check required secrets are configured
        id: guard
        env:
          REPO_TOKEN: ${{ secrets.WEKAN_REPO_TOKEN }}
          NC_KEY: ${{ secrets.NEXTCLOUD_APP_PRIVATE_KEY }}
          NC_CRT: ${{ secrets.NEXTCLOUD_APP_PUBLIC_CRT }}
          NC_TOKEN: ${{ secrets.NEXTCLOUD_APPSTORE_TOKEN }}
        run: |
          if [ -z "$REPO_TOKEN" ] || [ -z "$NC_KEY" ] || [ -z "$NC_CRT" ] || [ -z "$NC_TOKEN" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::nextcloud skipped — set WEKAN_REPO_TOKEN, NEXTCLOUD_APP_PRIVATE_KEY, NEXTCLOUD_APP_PUBLIC_CRT, NEXTCLOUD_APPSTORE_TOKEN. See docs/Design/Autoupdate/Nextcloud.md."
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout the wekan/nextcloud ExApp repo
        if: steps.guard.outputs.ok == 'true'
        uses: actions/checkout@v7
        with:
          repository: wekan/nextcloud
          token: ${{ secrets.WEKAN_REPO_TOKEN }}
          path: exapp

      - name: Log in to ghcr.io
        if: steps.guard.outputs.ok == 'true'
        env:
          GHCR_AUTH: ${{ secrets.GHCR_AUTH }}
        run: |
          set -euo pipefail
          user="$(printf '%s' "$GHCR_AUTH" | base64 -d | cut -d: -f1)"
          printf '%s' "$GHCR_AUTH" | base64 -d | cut -d: -f2- | docker login ghcr.io -u "$user" --password-stdin

      - name: Build and push the WeKan ExApp image
        if: steps.guard.outputs.ok == 'true'
        run: |
          set -euo pipefail
          cd exapp
          docker buildx build --push \
            -t ghcr.io/wekan/wekan-exapp:v${VERSION} \
            -t ghcr.io/wekan/wekan-exapp:latest \
            --build-arg WEKAN_VERSION=${VERSION} .

      - name: Update info.xml version and image tag, push
        if: steps.guard.outputs.ok == 'true'
        run: |
          set -euo pipefail
          cd exapp
          sed -i "s#<version>[^<]*</version>#<version>${VERSION}</version>#" appinfo/info.xml
          sed -i "s#<image-tag>[^<]*</image-tag>#<image-tag>v${VERSION}</image-tag>#" appinfo/info.xml
          git config user.name  'wekan-release-bot'
          git config user.email 'release@wekan.team'
          git add -A
          git commit -m "WeKan ExApp ${VERSION}" || echo "no changes"
          git push origin HEAD:main

      - name: Package, sign and publish to the Nextcloud App Store
        if: steps.guard.outputs.ok == 'true'
        env:
          APP_PRIVATE_KEY: ${{ secrets.NEXTCLOUD_APP_PRIVATE_KEY }}
          APPSTORE_TOKEN: ${{ secrets.NEXTCLOUD_APPSTORE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          APP_ID="$(grep -m1 -oP '(?<=<id>)[^<]+' exapp/appinfo/info.xml)"
          # Package the app folder as <app-id>.tar.gz (must contain appinfo/info.xml).
          tar -czf "${APP_ID}.tar.gz" --transform "s,^\./,${APP_ID}/," -C exapp .
          printf '%s' "$APP_PRIVATE_KEY" > app.key
          SIGN="$(openssl dgst -sha512 -sign app.key "${APP_ID}.tar.gz" | openssl base64 -A)"
          rm -f app.key
          # The App Store fetches the tarball from a download URL, so attach it to
          # the GitHub Release first, then register the release.
          gh release upload "v${VERSION}" "${APP_ID}.tar.gz" --clobber
          DL="https://github.com/wekan/wekan/releases/download/v${VERSION}/${APP_ID}.tar.gz"
          curl -fsSL -X POST https://apps.nextcloud.com/api/v1/apps/releases \
            -H "Authorization: Token ${APPSTORE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"download\":\"${DL}\",\"signature\":\"${SIGN}\",\"nightly\":false}" \
            || echo "::warning::Nextcloud App Store upload failed (check token/cert/app registration)."
