  # ─── 5. Build win64 bundle (rebuild native modules on Windows) ───────────────
  build-win64:
    needs: [prepare, build-amd64]
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '${{ needs.prepare.outputs.node_version }}'

      ## With Node 24 these are already preinstalled at GitHub Windows runners
      #- name: Install node-gyp and build tools
      #  run: |
      #    npm install -g windows-build-tools --vs2019 2>$null; exit 0

      - name: Install 7-zip
        run: choco install -y 7zip

      - name: Download amd64 bundle
        uses: actions/download-artifact@v8
        with:
          name: bundle-amd64

      - name: Fix bcrypt for Node.js 24
        shell: bash
        run: |
          7z x wekan-${VERSION}-amd64.zip
          # Fix: bcrypt 5.0.1 (Meteor accounts-password) ships node-addon-api@3
          # which fails to compile on Node.js 24. Replace with bcrypt 6.0.0.
          BCRYPT_DIR="$(pwd)/bundle/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt"
          if [ -d "$BCRYPT_DIR" ]; then
            rm -rf "$BCRYPT_DIR"
            TMP=$(mktemp -d)
            pushd "$TMP" > /dev/null
            npm pack bcrypt@6.0.0
            mkdir bcrypt && tar xzf bcrypt-*.tgz --strip-components=1 -C bcrypt
            cd bcrypt && npm install --ignore-scripts && cd ..
            cp -r bcrypt "$BCRYPT_DIR"
            popd > /dev/null
            rm -rf "$TMP"
          fi

      - name: Rebuild native modules for Windows
        shell: cmd
        run: |
          cd bundle\programs\server
          rmdir /s /q node_modules
          npm install
          cd ..\..\..

      - name: Create win64 zip
        shell: cmd
        run: 7z a wekan-%VERSION%-win64.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-win64
          path: wekan-${{ needs.prepare.outputs.version }}-win64.zip
          retention-days: 1

  # ─── 6. Create GitHub Release and upload all bundles ────────────────────────
  release:
    needs: [prepare, build-amd64, build-arm64, build-s390x, build-ppc64le, build-win64]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v8
        with:
          pattern: bundle-*
          merge-multiple: true

      - name: Create GitHub Release with all bundles
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.changelog }}
          files: |
            wekan-${{ needs.prepare.outputs.version }}-amd64.zip
            wekan-${{ needs.prepare.outputs.version }}-arm64.zip
            wekan-${{ needs.prepare.outputs.version }}-s390x.zip
            wekan-${{ needs.prepare.outputs.version }}-ppc64le.zip
            wekan-${{ needs.prepare.outputs.version }}-win64.zip

  # ─── 7. Build and push multi-platform Docker image ──────────────────────────
  docker:
    needs: [prepare, release]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.new_version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create Docker config with registry credentials
        run: |
          mkdir -p ~/.docker
          cat > ~/.docker/config.json <<EOF
          {
            "auths": {
              "ghcr.io": {
                "auth": "${{ secrets.GHCR_AUTH }}"
              },
              "https://index.docker.io/v1/": {
                "auth": "${{ secrets.DOCKERHUB_AUTH }}"
              },
              "quay.io": {
                "auth": "${{ secrets.QUAY_AUTH }}"
              }
            }
          }
          EOF

      - name: Create and use buildx builder
        run: |
          docker buildx create --name mybuilder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Build and push Docker image to all registries
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/s390x,linux/ppc64le \
            -t wekanteam/wekan:v${VERSION} \
            -t wekanteam/wekan:latest \
            -t quay.io/wekan/wekan:v${VERSION} \
            -t quay.io/wekan/wekan:latest \
            -t ghcr.io/wekan/wekan:v${VERSION} \
            -t ghcr.io/wekan/wekan:latest \
            --push .

  # ─── 8. Build and publish snap packages ──────────────────────────────────────
  # Build snap with snapcraft pack (like releases/snap-build.sh) using LXD,
  # then push to Snap Store edge channel (like releases/snap-push-to-store.sh).
  # Promote to stable manually via the Snap Store dashboard when ready.
  snap:
    needs: [prepare, release]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.new_version }}

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Build snap
        run: sudo snapcraft pack --destructive-mode

      - name: Upload snap files as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: snaps
          path: "*.snap"
          retention-days: 30

      - name: Push all snaps to Snap Store edge channel
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_AUTH }}
        run: |
          for snap_file in *.snap; do
            echo "Publishing $snap_file ..."
            snapcraft upload --release=edge "$snap_file"
          done

      - name: Upload all snaps to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          files: "*.snap"

  # ─── 9. Update Helm charts and deploy to GitHub Pages ─────────────────────────
  # Chart source is in helm/wekan/, published packages + index.yaml in docs/wekan/.
  # GitHub Pages deploys docs/wekan/ via Actions, serving at https://wekan.fi/wekan/
  helm:
    needs: [prepare, docker]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.new_version }}

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash



      - name: Update Chart.yaml and values.yaml with new version
        run: |
          CHART_PATH=docs/wekan
          CHART_FILE=$CHART_PATH/Chart.yaml
          VALUES_FILE=$CHART_PATH/values.yaml
          CHARTS_DIR=docs/charts
          INDEX_FILE=$CHARTS_DIR/index.yaml
          VERSION=${VERSION}
          # Update Chart.yaml (appVersion and version)
          sed -i "s/^appVersion: .*/appVersion: \"$VERSION\"/" "$CHART_FILE"
          sed -i "s/^version: .*/version: $VERSION.0/" "$CHART_FILE"
          # Update values.yaml (image.tag)
          sed -i "s/^  tag: v.*/  tag: v$VERSION/" "$VALUES_FILE"

      - name: Build Helm dependencies
        run: |
          cd docs/wekan
          helm repo add mongo https://groundhog2k.github.io/helm-charts/ || true
          helm dependency update
          helm dependency build

      - name: Package chart to docs/charts and update index.yaml
        run: |
          CHART_PATH=docs/wekan
          CHARTS_DIR=docs/charts
          INDEX_FILE=$CHARTS_DIR/index.yaml
          VERSION=${VERSION}
          cd $CHARTS_DIR
          helm package ../wekan -d .
          ARCHIVE=wekan-$VERSION.0.tgz
          SHA256=$(sha256sum "$ARCHIVE" | awk '{print $1}')
          CREATED=$(TZ='Europe/Helsinki' date '+%Y-%m-%dT%H:%M:%S.000000000%:z')
          if [ -f "$INDEX_FILE" ]; then
            awk '/^- apiVersion: v2/{flag=1;print;next}/^- apiVersion: v2/{flag=0}flag' "$INDEX_FILE" | head -n 30 > /tmp/topentry.yaml
            sed -i "s/appVersion: .*/appVersion: \"$VERSION\"/" /tmp/topentry.yaml
            sed -i "s/created: .*/created: \"$CREATED\"/" /tmp/topentry.yaml
            sed -i "s/digest: .*/digest: $SHA256/" /tmp/topentry.yaml
            sed -i "s|urls:.*|urls:\n    - https://wekan.github.io/wekan/wekan-$VERSION.0.tgz|" /tmp/topentry.yaml
            sed -i "s/version: .*/version: $VERSION.0/" /tmp/topentry.yaml
            awk 'NR==1{print;system("cat /tmp/topentry.yaml");next} /^  - apiVersion: v2/ && !p{p=1;next} 1' "$INDEX_FILE" > /tmp/index.yaml
            mv /tmp/index.yaml "$INDEX_FILE"
            rm /tmp/topentry.yaml
          else
            echo "index.yaml not found, skipping index update."
          fi

      - name: Commit updated chart and index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/wekan/ docs/charts/
          git commit -m "Helm chart ${VERSION}.0"
          git push origin HEAD:refs/heads/main

      - name: Upload docs/charts/ as Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/charts/

      - name: Commit updated chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/wekan/
          git commit -m "Helm chart ${VERSION}.0"
          git push origin HEAD:refs/heads/main

      - name: Upload docs/wekan/ as Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/wekan/

  # ─── 10. Deploy Helm chart to GitHub Pages ───────────────────────────────────
  deploy-pages:
    needs: helm
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
