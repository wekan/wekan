name: Release All Platforms

# Triggered manually via GitHub CLI or the Actions UI.
# Usage:
#   gh workflow run release-all.yml -f old_version=9.35 -f new_version=9.36
#
# Or use the convenience script (bumps versions, commits, pushes, then triggers):
#   ./releases/release-all.sh 9.35 9.36
#
# WeKan's default database is MongoDB, which ships server binaries only for amd64
# and arm64 (+ the win64/mac bundles). On every OTHER architecture that has a
# Node.js 24 build — ppc64le, s390x, riscv64 — there is no MongoDB, so those
# bundles ship FerretDB v1 instead: the wekan/FerretDB fork with its embedded
# pure-Go SQLite backend, which speaks the MongoDB wire protocol. FerretDB is
# built + released SEPARATELY (wekan/FerretDB, its own build.sh) as individual
# per-arch binaries; each bundle job downloads ONLY the ferretdb-<arch> binary for
# the platform it targets and bakes it in, so amd64/arm64 users can opt into it
# too (WEKAN_DB=ferretdb, `snap set wekan
# database=ferretdb`, or Docker env). Whichever backend is chosen binds the same
# MongoDB port, so MONGO_URL is unchanged. ppc64le/s390x/riscv64 are now covered
# by the Docker image as well (self-contained, FerretDB auto-started). riscv64
# uses unofficial-builds.nodejs.org for Node 24. (armv7l/32-bit ARM is still not
# built: there is NO Node.js 24 build for it anywhere, so nothing could run it.)
#
# This workflow does EVERYTHING for a release remotely (nothing is built or
# pushed on the maintainer's machine), running jobs in parallel where possible:
#   - bump:    runs releases/version.sh + releases/rebuild-docs.sh on the runner
#              (bumps Node/MongoDB/WeKan versions, rebuilds API docs), then
#              commits and pushes the bump to wekan/wekan main
#   - prepare: tags the bumped main as v<new_version> and extracts release notes
#   - website: updates the wekan/wekan.fi repo (install page + API docs) and pushes
#   - charts:  updates and publishes the wekan/charts Helm chart and pushes,
#              only AFTER the `docker` job has published the image (skipped if
#              docker fails)
#   - build-*: builds the amd64 bundle (full Meteor 3 build), then rebuilds native
#              modules for arm64 from that amd64 base. Each bundle job downloads
#              only the ferretdb-<arch> binary it needs from the newest wekan/FerretDB
#              release (FerretDB is built + released separately by its own build.sh —
#              not compiled here) and embeds it
#   - release: creates the GitHub Release with the newest CHANGELOG.md notes and
#              uploads the core wekan-<version>-{amd64,arm64}.zip bundles
#   - build-win64 / build-mac-arm64 / build-extra-arches: built AFTER release, each
#              rebuilds the amd64 bundle's native modules for its platform (Windows,
#              macOS arm64, and QEMU-emulated ppc64le/s390x/riscv64) and attaches
#              its .zip to the Release. Windows/macOS strip the Linux FerretDB back
#              out (MongoDB-only). Decoupled from `release` so a slow/flaky build
#              never blocks it
#   - docker:  builds and pushes the multi-arch image (amd64, arm64, ppc64le, s390x,
#              riscv64) to Docker Hub, Quay.io, GHCR
#   - snap:    builds the snap on Launchpad (amd64 + arm64) from the default
#              core24 `grade: stable` snapcraft.yaml, pushes it to the Snap Store
#              candidate + edge channels and attaches the .snap files to the GitHub
#              Release. `snap set wekan database=ferretdb` switches the running
#              backend to FerretDB v1 (snapcraft-core26.yaml is the core26 variant)
#
# Required GitHub Secrets:
#   GHCR_AUTH        - base64("username:token") for ghcr.io
#   DOCKERHUB_AUTH   - base64("username:token") for Docker Hub
#   QUAY_AUTH        - base64("username:token") for Quay.io
#   SNAP_AUTH        - Snap Store credentials (output of `snapcraft export-login`)
#   LP_CREDENTIALS   - base64 of the Launchpad credentials file used by
#                      `snapcraft remote-build` (see releases/snap-build.sh notes)
#   WEKAN_REPO_TOKEN - Personal Access Token with write access to wekan/wekan.fi
#                      and wekan/charts, used by the website + charts jobs to push
#                      to those repos (the built-in GITHUB_TOKEN only covers
#                      wekan/wekan). See releases/create-github-secrets.sh.

on:
  workflow_dispatch:
    inputs:
      old_version:
        description: 'Previous version number (e.g. 9.35, without v prefix)'
        required: true
        type: string
      new_version:
        description: 'New version number (e.g. 9.36, without v prefix)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

# Node.js major version that Meteor 3.5 bundles. Used for native module
# rebuilds on every platform — it must match the amd64 build's Node ABI.
env:
  NODE_VERSION: '24'

jobs:

  # ─── 0. Bump versions + rebuild API docs, commit to main ────────────────────
  # Runs releases/version.sh (probes upstream for the newest Node.js/MongoDB,
  # bumps every version reference) and releases/rebuild-docs.sh (regenerates
  # public/api/wekan.yml + wekan.html), then commits and pushes to main so the
  # tag, builds, website and charts jobs all see the bumped sources.
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install version-bump and docs build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip curl wget

      - name: Bump versions and rebuild API docs
        env:
          # Builds fetch dependencies from upstream themselves, so skip the slow
          # pre-download of Node/MongoDB tarballs that the local flow does.
          RELEASE_SKIP_DEP_DOWNLOAD: '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ./releases/version.sh "${{ inputs.old_version }}" "${{ inputs.new_version }}"
          ./releases/rebuild-docs.sh "${{ inputs.new_version }}"

      - name: Commit and push version bump
        run: |
          git add --all
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "Bump versions for v${{ inputs.new_version }}"
            git push origin main
          fi

  # ─── 1. Tag the release and extract release notes ───────────────────────────
  prepare:
    needs: bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Normalise version from input
        id: version
        run: |
          VERSION="${{ inputs.new_version }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag v${{ steps.version.outputs.version }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, leaving it as is."
          else
            git tag -a "v$VERSION" -m "v$VERSION"
            git push origin "v$VERSION"
          fi

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Prefer a version-specific "# v<version> ..." section, otherwise fall
          # back to the topmost "# Upcoming/Upcomig WeKan ® release" section.
          NOTES=$(python3 - <<PYEOF
          import re, sys
          version = "$VERSION"
          with open("CHANGELOG.md", encoding="utf-8") as f:
              content = f.read()
          patterns = [
              rf"(# v{re.escape(version)} .*?)(?=\n# v[0-9]|\Z)",
              r"(# Upcom\w* WeKan.*?)(?=\n# v[0-9]|\Z)",
          ]
          for pat in patterns:
              m = re.search(pat, content, re.DOTALL)
              if m:
                  print(m.group(1).strip())
                  sys.exit(0)
          print(f"WeKan v{version}")
          PYEOF
          )
          {
            echo "content<<GHEOF"
            echo "$NOTES"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

  # ─── 1b. Update the wekan.fi website repo (parallel) ────────────────────────
  # Bumps the version/Meteor/Node/MongoDB strings on the install page and copies
  # the freshly rebuilt API docs into wekan.fi/api/v<new>, then commits + pushes
  # to wekan/wekan.fi. Runs as soon as `bump` has pushed the bumped sources.
  website:
    needs: bump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wekan repo (bumped main, with rebuilt API docs)
        uses: actions/checkout@v7
        with:
          ref: main
          path: wekan

      - name: Checkout wekan.fi website repo
        uses: actions/checkout@v7
        with:
          repository: wekan/wekan.fi
          token: ${{ secrets.WEKAN_REPO_TOKEN }}
          path: wekan.fi

      - name: Update and push website
        env:
          WEBDIR: ${{ github.workspace }}/wekan.fi
          WEKANREPODIR: ${{ github.workspace }}/wekan
          RELEASE_PUSH_WEBSITE: '1'
        run: |
          cd wekan.fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd ..
          ./wekan/releases/release-website.sh "${{ inputs.old_version }}" "${{ inputs.new_version }}"

  # ─── 1c. Update and publish the Helm chart repo (after docker) ──────────────
  # Bumps the WeKan version in wekan/charts, packages the chart and publishes it
  # to the gh-pages Helm index, then pushes both branches. Runs only AFTER the
  # `docker` job succeeds: the chart points users at the freshly published
  # multi-arch image, so we don't advertise a new chart version until that image
  # is actually on the registries. If `docker` fails, this job is skipped.
  charts:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wekan repo (for releases/release-charts.sh + version refs)
        uses: actions/checkout@v7
        with:
          ref: main
          path: wekan

      - name: Checkout wekan/charts repo (main + gh-pages)
        uses: actions/checkout@v7
        with:
          repository: wekan/charts
          token: ${{ secrets.WEKAN_REPO_TOKEN }}
          fetch-depth: 0
          path: charts

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Fetch gh-pages branch (release-charts.sh switches to it)
        run: |
          cd charts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin '+refs/heads/*:refs/remotes/origin/*'
          git branch --track gh-pages origin/gh-pages 2>/dev/null || true

      - name: Release and publish chart
        env:
          CHARTS_DIR: ${{ github.workspace }}/charts
        run: |
          ./wekan/releases/release-charts.sh "${{ inputs.new_version }}"

  # ─── 2. Build amd64 bundle (full Meteor 3 build) ────────────────────────────
  # Meteor 3.5 installer supports only Linux x86_64/aarch64, macOS, Windows.
  # The full Meteor build always runs here on x86_64; every other platform then
  # only rebuilds the native npm modules from this bundle.
  build-amd64:
    needs: [prepare]
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: refs/tags/v${{ needs.prepare.outputs.version }}

      - name: Cache Meteor installation
        uses: actions/cache@v6
        with:
          path: ~/.meteor
          key: meteor-${{ hashFiles('.meteor/release') }}-${{ hashFiles('.meteor/packages') }}
          restore-keys: meteor-

      - name: Cache npm packages
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ make python3 curl wget zip unzip

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Meteor
        run: |
          if [ ! -f ~/.meteor/meteor ]; then
            curl https://install.meteor.com/ | sh
          fi
          echo "$HOME/.meteor" >> $GITHUB_PATH

      - name: Build WeKan bundle
        run: |
          rm -rf .build node_modules .meteor/local
          (meteor update --npm 2>/dev/null || true) && meteor npm install
          meteor build .build --directory

      - name: Install server npm modules
        run: |
          cd .build/bundle/programs/server
          npm install

      - name: Embed Node.js, FerretDB (amd64) and launcher into the bundle
        # Make the release .zip self-contained (offline): bundle Node.js + FerretDB
        # + a start-wekan.sh that runs WeKan on the bundled Node against the bundled
        # FerretDB (SQLite) by default, storing files on the filesystem under
        # WRITABLE_PATH. This amd64 bundle is the base every other Linux arch is
        # derived from; those jobs overwrite bundle/node and bundle/ferretdb with
        # their own arch's binaries and inherit this launcher.
        run: |
          # Bundled Node.js: the runner's node (setup-node) is linux-x64 Node 24,
          # matching this base bundle's arch.
          cp -L "$(command -v node)" .build/bundle/node
          chmod +x .build/bundle/node
          # Bundled FerretDB (amd64): download only this arch's binary from the
          # newest wekan/FerretDB release (per-arch assets, no ferretdb.zip).
          curl -fSL --retry 5 --retry-delay 10 -o .build/bundle/ferretdb \
            "https://github.com/wekan/FerretDB/releases/latest/download/ferretdb-amd64"
          chmod +x .build/bundle/ferretdb
          # Self-contained launcher (defaults to FerretDB SQLite + WRITABLE_PATH).
          cp releases/ferretdb/start-wekan.sh .build/bundle/
          chmod +x .build/bundle/start-wekan.sh

      - name: Create amd64 zip
        run: |
          cd .build
          zip -r wekan-${VERSION}-amd64.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-amd64
          path: .build/wekan-${{ needs.prepare.outputs.version }}-amd64.zip
          retention-days: 1

  # ─── 3. Build arm64 bundle (rebuild native modules natively) ─────────────────
  build-arm64:
    needs: [prepare, build-amd64]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ make python3 curl unzip zip

      - name: Download amd64 bundle
        uses: actions/download-artifact@v8
        with:
          name: bundle-amd64

      - name: Rebuild native modules for arm64 in container
        run: |
          unzip wekan-${VERSION}-amd64.zip
          # Fix: bcrypt 5.0.1 (Meteor accounts-password) ships node-addon-api@3
          # which fails to compile on Node.js 24. Replace with bcrypt 6.0.0.
          BCRYPT_DIR="$(pwd)/bundle/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt"
          if [ -d "$BCRYPT_DIR" ]; then
            rm -rf "$BCRYPT_DIR"
            TMP=$(mktemp -d)
            pushd "$TMP" > /dev/null
            npm pack bcrypt@6.0.0
            mkdir bcrypt && tar xzf bcrypt-*.tgz --strip-components=1 -C bcrypt
            cd bcrypt && npm install --ignore-scripts && cd ..
            cp -a bcrypt "$BCRYPT_DIR"
            popd > /dev/null
            rm -rf "$TMP"
          fi
          docker run --rm --platform linux/arm64 \
            -v "$(pwd)/bundle:/bundle" \
            -w /bundle/programs/server \
            node:${NODE_VERSION}-slim \
            sh -c "apt-get update -qq && apt-get install -y -q build-essential python3 && npm install"

      - name: Embed Node.js + FerretDB (arm64) into the bundle
        # The launcher (start-wekan.sh) is inherited from the amd64 base bundle;
        # swap bundle/node (runner is arm64 -> linux-arm64 Node 24) and bundle/ferretdb.
        run: |
          cp -L "$(command -v node)" bundle/node
          chmod +x bundle/node
          # Download only the arm64 FerretDB binary from the newest wekan/FerretDB release.
          curl -fSL --retry 5 --retry-delay 10 -o bundle/ferretdb \
            "https://github.com/wekan/FerretDB/releases/latest/download/ferretdb-arm64"
          chmod +x bundle/ferretdb

      - name: Create arm64 zip
        run: |
          zip -r wekan-${VERSION}-arm64.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-arm64
          path: wekan-${{ needs.prepare.outputs.version }}-arm64.zip
          retention-days: 1

  # ─── 7. Create GitHub Release and upload all bundles ────────────────────────
  release:
    needs:
      - prepare
      - build-amd64
      - build-arm64
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v8
        with:
          pattern: bundle-*
          merge-multiple: true

      - name: Create GitHub Release with all bundles
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.changelog }}
          # FerretDB binaries are NOT attached here: the per-arch ferretdb-<arch>
          # binaries live on the wekan/FerretDB releases
          # (https://github.com/wekan/FerretDB/releases), which is where the WeKan
          # builds fetch them from. Each wekan-<version>-<arch>.zip bundle embeds
          # its own arch's FerretDB binary.
          files: |
            wekan-${{ needs.prepare.outputs.version }}-amd64.zip
            wekan-${{ needs.prepare.outputs.version }}-arm64.zip

  # ─── 7b. Extra-platform bundles (win64, mac-arm64, s390x, ppc64le) ───────────
  # Every bundle below is built AFTER `release` and attaches its own .zip to the
  # already-created GitHub Release with `gh release upload --clobber`, rather than
  # being a prerequisite of `release`. This deliberately decouples the slower /
  # different-OS builds (Windows, macOS, QEMU-emulated arches) from the core
  # amd64/arm64 release, Docker and snap, so a slow or flaky one never blocks them.
  # These bundles are NOT part of the Docker image or snap.

  # Build win64 bundle (rebuild native modules on Windows).
  build-win64:
    needs: [prepare, build-amd64, release]
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      # Checked out into src/ so start-wekan.bat and snapcraft.yaml (which pins
      # the MongoDB tools/mongosh versions) are available; the downloaded bundle
      # is extracted alongside it in the workspace root.
      - uses: actions/checkout@v7
        with:
          ref: refs/tags/v${{ needs.prepare.outputs.version }}
          path: src

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install 7-zip
        run: choco install -y 7zip

      - name: Download amd64 bundle
        uses: actions/download-artifact@v8
        with:
          name: bundle-amd64

      - name: Fix bcrypt for Node.js 24
        shell: bash
        run: |
          7z x wekan-${VERSION}-amd64.zip
          # Drop the Linux node + FerretDB binaries + POSIX launcher inherited from
          # the amd64 base bundle; the Windows node.exe, ferretdb.exe and
          # start-wekan.bat are added in a later step.
          rm -f bundle/node bundle/ferretdb bundle/.ferretdb-default bundle/start-wekan.sh
          # Fix: bcrypt 5.0.1 (Meteor accounts-password) ships node-addon-api@3
          # which fails to compile on Node.js 24. Replace with bcrypt 6.0.0.
          BCRYPT_DIR="$(pwd)/bundle/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt"
          if [ -d "$BCRYPT_DIR" ]; then
            rm -rf "$BCRYPT_DIR"
            TMP=$(mktemp -d)
            pushd "$TMP" > /dev/null
            npm pack bcrypt@6.0.0
            mkdir bcrypt && tar xzf bcrypt-*.tgz --strip-components=1 -C bcrypt
            cd bcrypt && npm install --ignore-scripts && cd ..
            cp -r bcrypt "$BCRYPT_DIR"
            popd > /dev/null
            rm -rf "$TMP"
          fi

      - name: Rebuild native modules for Windows
        shell: bash
        run: |
          cd bundle/programs/server
          rm -rf node_modules
          npm install

      - name: Add MongoDB Database Tools to the bundle
        shell: bash
        run: |
          set -euo pipefail
          # MongoDB Database Tools (Windows) built by wekan/mongo-tools (pure Go),
          # one <tool>-win64.exe per tool from that repo's newest release — no
          # mongodb.com dependency. No mongosh: WeKan no longer bundles the MongoDB
          # Shell; scripted DB access uses the bundled Node.js 24 + `mongodb` driver.
          # (The Windows launcher, start-wekan.bat, is added by the FerretDB embed
          # step below from releases/ferretdb/start-wekan.bat.)
          BASE="https://github.com/wekan/mongo-tools/releases/latest/download"
          for tool in bsondump mongodump mongoexport mongofiles mongoimport mongorestore mongostat mongotop; do
            curl -fL --retry 5 --retry-delay 10 -o "bundle/${tool}.exe" "${BASE}/${tool}-win64.exe"
          done

          echo "=== bundle contents ==="
          ls -1 bundle/

      - name: Embed Node.js, FerretDB (win64) and launcher into the bundle
        shell: bash
        # Make the Windows .zip self-contained: bundle node.exe (from the runner's
        # win-x64 Node 24), ferretdb.exe (downloaded per-arch from the newest
        # wekan/FerretDB release) and start-wekan.bat. FerretDB embedding is
        # tolerant: if the win64 asset is missing the bundle stays MongoDB-only
        # (start-wekan.bat then won't find ferretdb.exe).
        run: |
          # Bundled Node.js (win-x64 node.exe from setup-node).
          NODE_SRC="$(command -v node)"
          [ -f "$NODE_SRC" ] || NODE_SRC="${NODE_SRC}.exe"
          cp "$NODE_SRC" bundle/node.exe
          # Bundled FerretDB (win64): download only this arch's binary.
          if curl -fSL --retry 5 --retry-delay 10 -o bundle/ferretdb.exe \
               "https://github.com/wekan/FerretDB/releases/latest/download/ferretdb-win64.exe"; then
            echo "Embedded FerretDB win64 -> bundle/ferretdb.exe"
          else
            rm -f bundle/ferretdb.exe
            echo "No win64 FerretDB asset in the release; Windows bundle stays MongoDB-only."
          fi
          # Self-contained Windows launcher (defaults to FerretDB SQLite).
          cp src/releases/ferretdb/start-wekan.bat bundle/

      - name: Create win64 zip
        shell: cmd
        run: 7z a wekan-%VERSION%-win64.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-win64
          path: wekan-${{ needs.prepare.outputs.version }}-win64.zip
          retention-days: 1

      - name: Attach win64 bundle to the GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The repo is checked out into src/, so the workspace root is not a git
          # repository; set GH_REPO so `gh` targets wekan/wekan without relying on
          # git remote detection (else: "fatal: not a git repository").
          GH_REPO: ${{ github.repository }}
        run: gh release upload "v${VERSION}" "wekan-${VERSION}-win64.zip" --clobber

  # Build mac-arm64 bundle (rebuild native modules on Apple Silicon).
  build-mac-arm64:
    needs: [prepare, build-amd64, release]
    runs-on: macos-14   # macos-14 runners are Apple Silicon (arm64)
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download amd64 bundle
        uses: actions/download-artifact@v8
        with:
          name: bundle-amd64

      - name: Rebuild native modules for macOS arm64
        run: |
          unzip -q wekan-${VERSION}-amd64.zip
          # Replace the Linux node + FerretDB binaries inherited from the amd64 base
          # bundle with the macOS builds (added in a later step). The POSIX launcher
          # start-wekan.sh works on macOS, so keep it.
          rm -f bundle/node bundle/ferretdb bundle/.ferretdb-default
          # Fix: bcrypt 5.0.1 (Meteor accounts-password) ships node-addon-api@3
          # which fails to compile on Node.js 24. Replace with bcrypt 6.0.0.
          BCRYPT_DIR="$(pwd)/bundle/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt"
          if [ -d "$BCRYPT_DIR" ]; then
            rm -rf "$BCRYPT_DIR"
            TMP=$(mktemp -d)
            pushd "$TMP" > /dev/null
            npm pack bcrypt@6.0.0
            mkdir bcrypt && tar xzf bcrypt-*.tgz --strip-components=1 -C bcrypt
            cd bcrypt && npm install --ignore-scripts && cd ..
            cp -a bcrypt "$BCRYPT_DIR"
            popd > /dev/null
            rm -rf "$TMP"
          fi
          cd bundle/programs/server
          rm -rf node_modules
          npm install
          cd ../../..

      - name: Embed Node.js + FerretDB (mac-arm64) into the bundle
        # Bundle the macOS arm64 Node.js (runner's darwin-arm64 Node 24) and the
        # macOS FerretDB binary, downloaded per-arch from the newest wekan/FerretDB
        # release. FerretDB is tolerant: if the mac-arm64 asset is missing the
        # bundle stays MongoDB-only (start-wekan.sh then won't find ferretdb).
        run: |
          cp -L "$(command -v node)" bundle/node
          chmod +x bundle/node
          if curl -fSL --retry 5 --retry-delay 10 -o bundle/ferretdb \
               "https://github.com/wekan/FerretDB/releases/latest/download/ferretdb-mac-arm64"; then
            chmod +x bundle/ferretdb
            echo "Embedded FerretDB mac-arm64 -> bundle/ferretdb"
          else
            rm -f bundle/ferretdb
            echo "No mac-arm64 FerretDB asset in the release; macOS bundle stays MongoDB-only."
            rm -f bundle/start-wekan.sh
          fi

      - name: Create mac-arm64 zip
        run: zip -r wekan-${VERSION}-mac-arm64.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-mac-arm64
          path: wekan-${{ needs.prepare.outputs.version }}-mac-arm64.zip
          retention-days: 1

      - name: Attach mac-arm64 bundle to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No repo checkout in this job, so set GH_REPO so `gh` knows the target
          # repository instead of trying (and failing) to detect a git remote.
          GH_REPO: ${{ github.repository }}
        run: gh release upload "v${VERSION}" "wekan-${VERSION}-mac-arm64.zip" --clobber

  # Extra-architecture Linux bundles (ppc64le, s390x, riscv64) — the arches that
  # have a Node.js 24 build but NO MongoDB server, so they ship FerretDB instead.
  # ppc64le and s390x use official nodejs.org binaries; riscv64 uses the
  # unofficial-builds.nodejs.org binary (nodejs.org ships no riscv64). armv7l
  # (32-bit ARM) is intentionally excluded: there is NO Node.js 24 build for it
  # anywhere (official or unofficial), so there is no runtime to run the bundle on
  # an armv7 device, regardless of RAM. See https://nodejs.org/dist/latest-v24.x/
  # (no -linux-armv7l) and https://unofficial-builds.nodejs.org/ (riscv64 only).
  build-extra-arches:
    needs: [prepare, build-amd64, release]
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: s390x
            platform: linux/s390x
            node_base: official
          - arch: ppc64le
            platform: linux/ppc64le
            node_base: official
          - arch: riscv64
            platform: linux/riscv64
            node_base: unofficial
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip zip

      - name: Set up QEMU for ${{ matrix.arch }} emulation
        uses: docker/setup-qemu-action@v4

      - name: Download amd64 bundle
        uses: actions/download-artifact@v8
        with:
          name: bundle-amd64

      - name: Rebuild native modules for ${{ matrix.arch }} under emulation
        run: |
          unzip -q wekan-${VERSION}-amd64.zip
          # Same bcrypt fix as the arm64 build: bcrypt 5.0.1 (Meteor
          # accounts-password) ships node-addon-api@3 which fails to compile on
          # Node.js 24. Swap in bcrypt 6.0.0 source; the emulated npm install
          # below compiles it (and any other native module) for the target arch.
          BCRYPT_DIR="$(pwd)/bundle/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt"
          if [ -d "$BCRYPT_DIR" ]; then
            rm -rf "$BCRYPT_DIR"
            TMP=$(mktemp -d)
            pushd "$TMP" > /dev/null
            npm pack bcrypt@6.0.0
            mkdir bcrypt && tar xzf bcrypt-*.tgz --strip-components=1 -C bcrypt
            cd bcrypt && npm install --ignore-scripts && cd ..
            cp -a bcrypt "$BCRYPT_DIR"
            popd > /dev/null
            rm -rf "$TMP"
          fi
          # The official node:${NODE_VERSION} Docker image only publishes amd64,
          # arm64 and ppc64le manifests — no s390x, no riscv64 — so
          # `docker run --platform linux/s390x node:24-slim` fails with "no matching
          # manifest". Instead build on an ubuntu:26.04 base (which publishes every
          # arch) and install the Node.js binary tarball inside the emulated
          # container: ppc64le/s390x from nodejs.org (official), riscv64 from
          # unofficial-builds.nodejs.org (nodejs.org ships no riscv64). Resolve the
          # exact latest ${NODE_VERSION}.x version on the host (fast, no emulation)
          # and pass it in along with which mirror to use.
          NODE_FULL=$(curl -fsSL https://nodejs.org/dist/index.json \
            | python3 -c "import json,sys; print(next(r['version'] for r in json.load(sys.stdin) if r['version'].startswith('v${NODE_VERSION}.')))")
          echo "Using Node ${NODE_FULL} (${{ matrix.node_base }}) for ${{ matrix.arch }}"
          docker run --rm --platform ${{ matrix.platform }} \
            -e NODE_FULL="$NODE_FULL" -e ARCH="${{ matrix.arch }}" \
            -e NODE_BASE="${{ matrix.node_base }}" \
            -v "$(pwd)/bundle:/bundle" \
            -w /bundle/programs/server \
            ubuntu:26.04 \
            bash -c '
              set -eux
              apt-get update -qq
              apt-get install -y -q build-essential python3 curl xz-utils ca-certificates
              if [ "$NODE_BASE" = unofficial ]; then
                NODE_URL="https://unofficial-builds.nodejs.org/download/release/${NODE_FULL}/node-${NODE_FULL}-linux-${ARCH}.tar.xz"
              else
                NODE_URL="https://nodejs.org/dist/${NODE_FULL}/node-${NODE_FULL}-linux-${ARCH}.tar.xz"
              fi
              curl -fsSL -o /tmp/node.tar.xz "$NODE_URL"
              mkdir -p /opt/node
              tar -xJf /tmp/node.tar.xz -C /opt/node --strip-components=1
              export PATH=/opt/node/bin:$PATH
              node --version
              npm install
              # Bundle the target-arch Node.js binary for the self-contained
              # launcher. /bundle is the host bundle/ dir (see -v mount above).
              cp /opt/node/bin/node /bundle/node
              chmod +x /bundle/node
            '

      - name: Embed FerretDB (${{ matrix.arch }}) into the bundle
        # These arches have no MongoDB server, so FerretDB is their default DB.
        # The launcher (start-wekan.sh) is inherited from the amd64 base bundle;
        # download only this arch's binary from the newest wekan/FerretDB release.
        # A marker file makes FerretDB the default backend at runtime (see the
        # launcher + Docker entrypoint).
        run: |
          curl -fSL --retry 5 --retry-delay 10 -o bundle/ferretdb \
            "https://github.com/wekan/FerretDB/releases/latest/download/ferretdb-${{ matrix.arch }}"
          chmod +x bundle/ferretdb
          touch bundle/.ferretdb-default

      - name: Create ${{ matrix.arch }} zip
        run: zip -r wekan-${VERSION}-${{ matrix.arch }}.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.arch }}
          path: wekan-${{ needs.prepare.outputs.version }}-${{ matrix.arch }}.zip
          retention-days: 1

      - name: Attach ${{ matrix.arch }} bundle to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No repo checkout in this job, so set GH_REPO so `gh` knows the target
          # repository instead of trying (and failing) to detect a git remote.
          GH_REPO: ${{ github.repository }}
        run: gh release upload "v${VERSION}" "wekan-${VERSION}-${{ matrix.arch }}.zip" --clobber

  # ─── 8. Build and push the multi-arch Docker image to all registries ────────
  # Mirrors releases/docker-build.sh step 3 (multi-arch buildx --push).
  # Needs `release` because the Dockerfile downloads wekan-<version>-<arch>.zip
  # from the GitHub Release; building before those assets exist 404s and (without
  # set -e in the Dockerfile) shipped a broken image missing /build/main.js. Also
  # needs `build-extra-arches` because the image now covers ppc64le/s390x/riscv64,
  # whose zips (with FerretDB baked in) are attached by that job after `release`.
  docker:
    needs: [prepare, release, build-extra-arches]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: refs/tags/v${{ needs.prepare.outputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub, Quay.io and GHCR
        env:
          DOCKERHUB_AUTH: ${{ secrets.DOCKERHUB_AUTH }}
          QUAY_AUTH: ${{ secrets.QUAY_AUTH }}
          GHCR_AUTH: ${{ secrets.GHCR_AUTH }}
        run: |
          login() {
            # $1 = registry host, $2 = base64("user:token")
            local host="$1" creds user token
            creds="$(printf '%s' "$2" | base64 -d)"
            user="${creds%%:*}"
            token="${creds#*:}"
            printf '%s' "$token" | docker login "$host" -u "$user" --password-stdin
          }
          login docker.io "$DOCKERHUB_AUTH"
          login quay.io   "$QUAY_AUTH"
          login ghcr.io   "$GHCR_AUTH"

      - name: Wait for release bundles to be downloadable
        # The Dockerfile downloads wekan-<version>-<arch>.zip from the GitHub
        # Release for each built platform. Even though this job needs `release`
        # (so the assets are uploaded), GitHub's releases/download/<tag>/<asset>
        # URL can briefly 404 right after upload (CDN/propagation lag), which used
        # to fail the multi-arch build mid-way. Poll here until every arch bundle
        # baked into the image returns 200, so the (expensive, emulated) buildx run
        # only starts once the assets are actually fetchable. The Dockerfile also
        # retries per-arch as a second layer of safety.
        run: |
          set -euo pipefail
          base="https://github.com/wekan/wekan/releases/download/v${VERSION}"
          for arch in amd64 arm64 ppc64le s390x riscv64; do
            url="${base}/wekan-${VERSION}-${arch}.zip"
            echo "Waiting for ${url} ..."
            ok=0
            for i in $(seq 1 30); do
              code=$(curl -sSL -o /dev/null -w '%{http_code}' --retry 0 -I "$url" || echo 000)
              if [ "$code" = "200" ]; then
                echo "  available (HTTP $code) after $((i*10))s"
                ok=1
                break
              fi
              echo "  attempt $i/30: HTTP $code, retrying in 10s..."
              sleep 10
            done
            if [ "$ok" -ne 1 ]; then
              echo "::error::Release asset not downloadable after retries: $url"
              exit 1
            fi
          done

      - name: Verify the release bundle reports the release version
        # Belt-and-suspenders against the "image tagged vX shows vY in the Admin
        # Panel" bug: the image is just the unzipped wekan-<version>-<arch>.zip
        # bundle (Dockerfile moves it to /build), and the Admin Panel shows that
        # bundle's WeKan version (server/statistics.js reads
        # require('/package.json').version). Check the amd64 bundle's WeKan version
        # equals the release version BEFORE the expensive multi-arch buildx, so a
        # stale/mismatched bundle fails fast instead of shipping (and pushing to
        # three registries) a mislabeled image.
        #
        # Meteor does NOT ship the app package.json as a standalone file — it
        # inlines it into the compiled bundle/programs/server/app/app.js as a JSON
        # module, e.g. {"name":"wekan","version":"v9.63.0",...}. That inlined
        # module (anchored on "name":"wekan") is exactly what require('/package.json')
        # resolves to at runtime, so it is the authoritative thing to check.
        #
        # IMPORTANT: only a CONFIRMED mismatch fails the release. If the version
        # cannot be located (bundle layout changed, app.js minified differently),
        # warn and continue — inability to verify must not block a good release,
        # since --build-arg VERSION below is the actual guarantee. (An earlier
        # version of this guard grepped for a v-prefixed *package.json* and made
        # "not found" fatal, which false-failed the whole v9.63 docker build.)
        run: |
          set -euo pipefail
          url="https://github.com/wekan/wekan/releases/download/v${VERSION}/wekan-${VERSION}-amd64.zip"
          wget -q "$url" -O bundle.zip
          tmp="$(mktemp -d)"
          # Extract only the compiled app program (not the whole multi-hundred-MB
          # bundle); the inlined app package.json lives in app/app.js.
          unzip -o -q bundle.zip 'bundle/programs/server/app/app.js' -d "$tmp" || true
          appjs="$tmp/bundle/programs/server/app/app.js"
          found=""
          if [ -f "$appjs" ]; then
            match="$(grep -aoE '"name":"wekan","version":"v?[0-9][^"]*"' "$appjs" | head -1 || true)"
            found="$(printf '%s' "$match" | sed -E 's/.*"version":"([^"]*)".*/\1/')"
          fi
          rm -rf "$tmp" bundle.zip
          if [ -z "$found" ]; then
            echo "::warning::Could not locate the WeKan version in the bundle (app.js layout may have changed); skipping the bundle-version check. --build-arg VERSION still guarantees the correct bundle."
            exit 0
          fi
          norm="${found#v}"
          if [ "$norm" != "${VERSION}.0" ] && [ "$norm" != "${VERSION}" ]; then
            echo "::error::Bundle reports app version ${found} but the release is v${VERSION}. The bundle baked into the image is stale/mismatched — the Admin Panel would show ${norm}. Aborting before build."
            exit 1
          fi
          echo "Bundle app version ${found} matches release v${VERSION}."

      - name: Build and push multi-arch image
        # Pass VERSION explicitly as a build-arg. The Dockerfile's `ARG VERSION`
        # default is only a fallback for manual builds; the release version is the
        # authoritative source here. Without this the image would build against the
        # Dockerfile default (downloading that version's wekan-<v>-<arch>.zip and
        # baking its package.json), so a v${VERSION}-tagged image could ship — and
        # report in the Admin Panel — a stale, different version.
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/ppc64le,linux/s390x,linux/riscv64 \
            --build-arg VERSION=${VERSION} \
            -t wekanteam/wekan:v${VERSION} \
            -t wekanteam/wekan:latest \
            -t quay.io/wekan/wekan:v${VERSION} \
            -t quay.io/wekan/wekan:latest \
            -t ghcr.io/wekan/wekan:v${VERSION} \
            -t ghcr.io/wekan/wekan:latest \
            --push \
            .

  # ─── 9. Build the snap on Launchpad, push to the store, attach to release ────
  # The snap's `wekan` part downloads wekan-<version>-<arch>.zip from the GitHub
  # Release, so this job runs only after `release` has published those assets.
  # `snapcraft remote-build` builds every platform listed in snapcraft.yaml
  # (amd64 + arm64) on Launchpad.
  snap:
    needs: [prepare, release]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: refs/tags/v${{ needs.prepare.outputs.version }}
          # remote-build (Launchpad) rejects shallow clones, so fetch full history
          fetch-depth: 0

      - name: Install snapcraft
        # The Snap Store intermittently rejects the install with
        # 'error: cannot install "snapcraft": too many requests' (a 429-style
        # rate limit) that instantly fails the whole snap job before any build.
        # Retry a few times so one transient store throttle does not fail the
        # release (same spirit as the remote-build retry below).
        run: |
          set -uo pipefail
          for i in 1 2 3 4 5; do
            sudo snap install snapcraft --classic && exit 0
            echo "snapcraft install attempt $i/5 failed (Snap Store throttle?); retrying in 30s..."
            sleep 30
          done
          echo "::error::snapcraft install failed after 5 attempts (Snap Store rate limit)."
          exit 1

      - name: Provide Launchpad credentials for remote-build
        env:
          LP_CREDENTIALS: ${{ secrets.LP_CREDENTIALS }}
        run: |
          mkdir -p ~/.local/share/snapcraft
          printf '%s' "$LP_CREDENTIALS" | base64 -d > ~/.local/share/snapcraft/launchpad-credentials
          chmod 600 ~/.local/share/snapcraft/launchpad-credentials

      - name: Verify snapcraft.yaml version matches the release
        # The `bump` job (releases/version.sh) is the single source of truth for
        # the snap version and updates snapcraft.yaml before the tag is created.
        # snapcraft.yaml's `version:` names the produced files
        # (wekan_<version>_<arch>.snap), so if a stale tag carried the wrong
        # version the build would produce wekan_<old>_*.snap and the upload/attach
        # globs (wekan_${VERSION}_*.snap) would match nothing — passing the literal
        # glob to `snapcraft upload` ("is not a valid file", exit 64). Assert it
        # here so that mismatch fails fast (before a ~20 min Launchpad build) with
        # a clear pointer, instead of re-bumping the version inside this build job.
        run: |
          set -euo pipefail
          if ! grep -qxF "version: '${VERSION}'" snapcraft.yaml; then
            echo "::error::snapcraft.yaml is not at version '${VERSION}' ($(grep -m1 '^version:' snapcraft.yaml)). The bump job (releases/version.sh) did not update the tagged commit."
            exit 1
          fi
          echo "snapcraft.yaml is at version '${VERSION}'."

      - name: Build snaps on Launchpad (amd64 + arm64)
        # `snapcraft remote-build` is experimental and talks to Launchpad over
        # HTTPS after pushing the whole repo; it intermittently dies with a
        # transient TLS drop (e.g. "SSLEOFError: EOF occurred in violation of
        # protocol", exit 70) that has nothing to do with the build itself.
        # Retry a few times so one network hiccup doesn't fail the release.
        run: |
          set -uo pipefail
          shopt -s nullglob
          attempts=3
          for i in $(seq 1 "$attempts"); do
            echo "::group::Remote build attempt $i/$attempts"
            snapcraft remote-build --launchpad-accept-public-upload && rc=0 || rc=$?
            echo "::endgroup::"
            # snapcraft remote-build can exit 0 even when the Launchpad build
            # FAILED (it just downloads the build logs and produces no .snap), so
            # don't trust the exit code alone — require that .snap files exist.
            snaps=( wekan_${VERSION}_*.snap )
            if [ "$rc" -eq 0 ] && [ "${#snaps[@]}" -gt 0 ]; then
              echo "Remote build succeeded on attempt $i: ${snaps[*]}"
              exit 0
            fi
            echo "Attempt $i: snapcraft exit=$rc, .snap files produced=${#snaps[@]}."
            # Surface the Launchpad build logs so a real build failure is
            # diagnosable here, instead of as a later cryptic upload error.
            for log in snapcraft-wekan-*.txt; do
              echo "::group::Launchpad build log: $log (last 150 lines)"
              tail -n 150 "$log"
              echo "::endgroup::"
            done
            if [ "$i" -lt "$attempts" ]; then
              echo "Retrying in 60s..."
              sleep 60
            fi
          done
          echo "::error::Remote build failed after $attempts attempts (no wekan_${VERSION}_*.snap produced)." >&2
          exit 1

      - name: Push snaps to the Snap Store (candidate + edge channels)
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_AUTH }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          snaps=( wekan_${VERSION}_*.snap )
          if [ "${#snaps[@]}" -eq 0 ]; then
            echo "::error::No wekan_${VERSION}_*.snap files to upload."
            exit 1
          fi
          # The default snapcraft.yaml is now the core24 `grade: stable` build, so
          # it can be released to candidate (not possible with the core26 devel
          # grade). Publish to candidate + edge.
          for f in "${snaps[@]}"; do
            echo "Uploading $f to the Snap Store (candidate,edge)..."
            snapcraft upload --release=candidate,edge "$f"
          done

      - name: Attach snaps to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          snaps=( wekan_${VERSION}_*.snap )
          if [ "${#snaps[@]}" -eq 0 ]; then
            echo "::error::No wekan_${VERSION}_*.snap files to attach."
            exit 1
          fi
          gh release upload "v${VERSION}" "${snaps[@]}" --clobber
