name: Release All Platforms

# Triggered manually via GitHub CLI or Actions UI.
# Usage:
#   gh workflow run release-all.yml -f old_version=8.42 -f new_version=8.43
#
# Or use the convenience script (commits pending changes, pushes, and triggers):
#   ./releases/release-all.sh 8.42 8.43
#
# Required GitHub Secrets:
#   GHCR_AUTH      - base64(username:token) for ghcr.io
#   DOCKERHUB_AUTH - base64(username:token) for Docker Hub
#   QUAY_AUTH      - base64(username:token) for Quay.io
#   SNAP_AUTH      - Snapcraft store credentials

on:
  workflow_dispatch:
    inputs:
      old_version:
        description: 'Previous version number (e.g. 8.42, without v prefix)'
        required: true
        type: string
      new_version:
        description: 'New version number (e.g. 8.43, without v prefix)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  # ─── 0. Version bump, docs rebuild, and tag creation ────────────────────────
  # Runs update-node-version.sh, rebuild-docs.sh, and sed-release-versions.sh,
  # then commits, pushes, and creates the version tag.
  # Skipped on re-run if the tag already exists.
  version-bump:
    runs-on: ubuntu-latest
    outputs:
      node_version: ${{ steps.detect_node.outputs.node_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ inputs.new_version }}$"; then
            echo "existed=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ inputs.new_version }} already exists. Skipping version bump."
          else
            echo "existed=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect latest Node.js 24.x version
        id: detect_node
        run: |
          NODE_VER=$(curl -fsSL https://nodejs.org/dist/latest-v24.x/ \
            | grep -o 'node-v24\.[0-9][0-9]*\.[0-9][0-9]*-linux-x64\.tar\.gz' \
            | head -1 \
            | sed 's/node-v\(.*\)-linux-x64\.tar\.gz/\1/')
          if [ -z "$NODE_VER" ]; then
            echo "Error: could not determine latest Node.js 24.x version." >&2
            exit 1
          fi
          echo "node_version=$NODE_VER" >> $GITHUB_OUTPUT
          echo "Detected latest Node.js 24.x: $NODE_VER"

      - name: Detect latest MongoDB 7.x version and update snapcraft.yaml
        id: detect_mongodb
        run: |
          set -e
          # Fetch all available Ubuntu versions for MongoDB 7.x
          MONGO_LINE=$(curl -fsSL https://www.mongodb.com/try/download/community | grep -o 'mongodb-linux-x86_64-ubuntu[0-9]\+-7\.[0-9][0-9]*\.[0-9][0-9]*\.tgz' | sort -u | sort -t- -k4,4nr | head -1)
          if [ -z "$MONGO_LINE" ]; then
            echo "Error: could not determine latest MongoDB 7.x version." >&2
            exit 1
          fi
          # Extract Ubuntu version and MongoDB version
          UBUNTU_VER=$(echo "$MONGO_LINE" | sed -E 's/.*ubuntu([0-9]+)-7\..*/\1/')
          MONGO_VER=$(echo "$MONGO_LINE" | sed -E 's/.*-7/7/' | sed 's/\.tgz$//')
          echo "mongodb_ubuntu=$UBUNTU_VER" >> $GITHUB_OUTPUT
          echo "mongodb_version=$MONGO_VER" >> $GITHUB_OUTPUT
          echo "Detected latest MongoDB 7.x: $MONGO_VER for Ubuntu $UBUNTU_VER"
          # Update snapcraft.yaml source URL (replace any ubuntu version)
          sed -i "s|mongodb-linux-x86_64-ubuntu[0-9]\+-7\\.[0-9][0-9]*\\.[0-9][0-9]*|mongodb-linux-x86_64-ubuntu${UBUNTU_VER}-$MONGO_VER|g" snapcraft.yaml

      - uses: actions/setup-node@v6
        if: steps.check.outputs.existed == 'false'
        with:
          node-version: '${{ steps.detect_node.outputs.node_version }}'

      - name: Install Python dependencies for API doc generation
        if: steps.check.outputs.existed == 'false'
        run: python3 -m pip install --break-system-packages esprima

      - name: Delete GitHub Actions caches
        if: steps.check.outputs.existed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh cache delete --all || true

      - name: Update Node.js to latest 24.x
        if: steps.check.outputs.existed == 'false'
        run: ./releases/update-node-version.sh

      - name: Rebuild API docs
        if: steps.check.outputs.existed == 'false'
        run: ./releases/rebuild-docs.sh "${{ inputs.new_version }}"

      - name: Update version numbers in release files
        if: steps.check.outputs.existed == 'false'
        run: ./releases/sed-release-versions.sh "${{ inputs.old_version }}" "${{ inputs.new_version }}"

      - name: Update website install/index.html versions
        if: steps.check.outputs.existed == 'false'
        run: |
          set -e
          # Update MongoDB version (and Ubuntu version) in docs/install/index.html from snapcraft.yaml
          MONGO_LINE=$(grep -o 'mongodb-linux-x86_64-ubuntu[0-9]\+-7\.[0-9][0-9]*\.[0-9][0-9]*' snapcraft.yaml | head -1)
          if [ -n "$MONGO_LINE" ]; then
            UBUNTU_VER=$(echo "$MONGO_LINE" | sed -E 's/.*ubuntu([0-9]+)-7\..*/\1/')
            MONGODB_VERSION=$(echo "$MONGO_LINE" | sed -E 's/.*-7/7/')
            sed -i "s|MongoDB 7\\.x|MongoDB $MONGODB_VERSION Ubuntu $UBUNTU_VER|g" docs/install/index.html
          fi
          # Update Meteor, Node.js, and NPM versions in docs/install/index.html
          METEOR_VERSION=$(grep -o 'METEOR@[^ "\\]*' .meteor/release | head -1)
          NODE_VERSION=$(grep -o 'NODE_VERSION=[^ \\]*' Dockerfile | head -1 | cut -d= -f2 | tr -d '"')
          NPM_VERSION=$(grep -o 'NPM_VERSION=[^ \\]*' Dockerfile | head -1 | cut -d= -f2 | tr -d '"')
          sed -i "s|<span id=\"meteor-version\">[^<]*</span>|<span id=\"meteor-version\">$METEOR_VERSION</span>|g" docs/install/index.html
          sed -i "s|<span id=\"node-version\">[^<]*</span>|<span id=\"node-version\">$NODE_VERSION</span>|g" docs/install/index.html
          sed -i "s|<span id=\"npm-version\">[^<]*</span>|<span id=\"npm-version\">$NPM_VERSION</span>|g" docs/install/index.html
          # Update WeKan version in docs/install/index.html
          sed -i "s|<span class=\"version-number\">v${{ inputs.old_version }}</span>|<span class=\"version-number\">v${{ inputs.new_version }}</span>|g" docs/install/index.html
          # Update Meteor and Node.js versions in the <h2 class=\"fw-bold\"> line
          sed -i "s|\(Meteor \)[^,]*,|\1${METEOR_VERSION},|g" docs/install/index.html
          sed -i "s|\(Node\.js \)[0-9][0-9]*\.[x0-9a-zA-Z.-]*|\1${NODE_VERSION}|g" docs/install/index.html

      - name: Commit and push version bump
        if: steps.check.outputs.existed == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all
          # GITHUB_TOKEN cannot push workflow file changes; exclude them
          git reset HEAD -- .github/workflows/ || true
          git checkout -- .github/workflows/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "v${{ inputs.new_version }}"
          fi
          git push

      - name: Create and push tag
        if: steps.check.outputs.existed == 'false'
        run: |
          git tag -a "v${{ inputs.new_version }}" -m "v${{ inputs.new_version }}"
          git push origin "v${{ inputs.new_version }}"

  # ─── 1. Extract version and release notes ───────────────────────────────────
  prepare:
    needs: version-bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.content }}
      node_version: ${{ needs.version-bump.outputs.node_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.new_version }}

      - name: Set version from input
        id: version
        run: |
          VERSION="${{ inputs.new_version }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Try to find the version-specific section first, then fall back to Upcoming
          NOTES=$(python3 - <<PYEOF
          import re, sys
          version = "$VERSION"
          with open("CHANGELOG.md", encoding="utf-8") as f:
              content = f.read()
          # Pattern: section heading through (but not including) the next heading
          patterns = [
              rf"(# v{re.escape(version)} .*?)(?=\n# v[0-9]|\Z)",
              r"(# Upcoming WeKan.*?)(?=\n# v[0-9]|\Z)",
          ]
          for pat in patterns:
              m = re.search(pat, content, re.DOTALL)
              if m:
                  print(m.group(1).strip())
                  sys.exit(0)
          print(f"WeKan v{version}")
          PYEOF
          )
          echo "content<<GHEOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "GHEOF" >> $GITHUB_OUTPUT

  # ─── 2. Build amd64 bundle (full Meteor 3 build) ────────────────────────────
  # Meteor 3.5-beta.7 installer supports only: Linux x86_64, Linux aarch64, macOS, Windows.
  # It explicitly rejects armhf, s390x, and ppc64le at install time.
  # Therefore the full Meteor build always runs here on x86_64.
  # All other Linux architectures then rebuild only the native npm modules
  # from this bundle (much faster than a full Meteor build).
  # Node.js version must match what Meteor 3.5-beta.7 bundles (detected automatically).
  build-amd64:
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      NODE_VERSION: ${{ needs.prepare.outputs.node_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/v${{ inputs.new_version }}

      - name: Cache Meteor installation
        uses: actions/cache@v5
        with:
          path: ~/.meteor
          key: meteor-${{ hashFiles('.meteor/release') }}-${{ hashFiles('.meteor/packages') }}
          restore-keys: meteor-

      - name: Cache npm packages
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ make python3 curl wget zip unzip

      # Pin to detected latest Node.js 24.x — must match Meteor's bundled version.
      # Using the same version for build and npm rebuild ensures consistent native module ABI.
      - uses: actions/setup-node@v6
        with:
          node-version: '${{ needs.prepare.outputs.node_version }}'

      - name: Install Meteor
        run: |
          if [ ! -f ~/.meteor/meteor ]; then
            curl https://install.meteor.com/ | sh
          fi
          echo "$HOME/.meteor" >> $GITHUB_PATH

      - name: Build WeKan bundle
        run: |
          rm -rf .build node_modules .meteor/local
          (meteor update --npm 2>/dev/null || true) && meteor npm install
          meteor build .build --directory

      - name: Create amd64 zip
        run: |
          cd .build
          zip -r wekan-${VERSION}-amd64.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-amd64
          path: .build/wekan-${{ needs.prepare.outputs.version }}-amd64.zip
          retention-days: 1

  # ─── 3. Build arm64 bundle (rebuild native modules natively) ─────────────────
  # Meteor 3.5-beta.7 does support Linux aarch64, but running a full Meteor build a
  # second time would double the build time for the same result. npm rebuild on
  # the native arm64 GitHub Actions runner is much faster and produces the same
  # platform-specific native modules.
  build-arm64:
    needs: [prepare, build-amd64]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      NODE_VERSION: ${{ needs.prepare.outputs.node_version }}
      NODE_VERSION_ARM64: ''
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ make python3 curl unzip zip


      - name: Set Node.js version for arm64
        id: node_arm64
        run: |
          echo "NODE_VERSION_ARM64=24" >> $GITHUB_ENV

      - name: Download amd64 bundle
        uses: actions/download-artifact@v8
        with:
          name: bundle-amd64

      - name: Rebuild native modules for arm64 in container
        run: |
          unzip wekan-${VERSION}-amd64.zip
          # Fix: bcrypt 5.0.1 (Meteor accounts-password) ships node-addon-api@3
          # which fails to compile on Node.js 24. Replace with bcrypt 6.0.0.
          BCRYPT_DIR="$(pwd)/bundle/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt"
          if [ -d "$BCRYPT_DIR" ]; then
            rm -rf "$BCRYPT_DIR"
            TMP=$(mktemp -d)
            pushd "$TMP" > /dev/null
            npm pack bcrypt@6.0.0
            mkdir bcrypt && tar xzf bcrypt-*.tgz --strip-components=1 -C bcrypt
            cd bcrypt && npm install --ignore-scripts && cd ..
            cp -a bcrypt "$BCRYPT_DIR"
            popd > /dev/null
            rm -rf "$TMP"
          fi
          # Use the latest available Node.js 24.x slim image for arm64
          docker run --rm --platform linux/arm64 \
            -v "$(pwd)/bundle:/bundle" \
            -w /bundle/programs/server \
            node:24-slim \
            sh -c "apt-get update -qq && apt-get install -y -q build-essential python3 && npm install"

      - name: Clean up and create arm64 zip
        run: |
          zip -r wekan-${VERSION}-arm64.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-arm64
          path: wekan-${{ needs.prepare.outputs.version }}-arm64.zip
          retention-days: 1

  # ─── 4. Build s390x bundle (rebuild native modules via QEMU container) ───────
  # Meteor 3.5-beta.7 does NOT support s390x (installer exits with error on that arch).
  # GitHub Actions has no native s390x runners.
  # Solution: QEMU emulation + node:<version>-slim (s390x variant) for npm rebuild.
  build-s390x:
    needs: [prepare, build-amd64]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      NODE_VERSION: ${{ needs.prepare.outputs.node_version }}
      NODE_VERSION_S390X: ''
    steps:
      - name: Set up QEMU for s390x
        uses: docker/setup-qemu-action@v4
        with:
          platforms: s390x

      - name: Install unzip/zip
        run: sudo apt-get update && sudo apt-get install -y unzip zip

      - name: Download amd64 bundle
        uses: actions/download-artifact@v8
        with:
          name: bundle-amd64

      - name: Set Node.js version for s390x
        id: node_s390x
        run: |
          echo "NODE_VERSION_S390X=24" >> $GITHUB_ENV

      - name: Rebuild native modules for s390x in container
        run: |
          unzip wekan-${VERSION}-amd64.zip
          rm -rf bundle/programs/server/node_modules
          # Fix: bcrypt 5.0.1 (Meteor accounts-password) ships node-addon-api@3
          # which fails to compile on Node.js 24. Replace with bcrypt 6.0.0.
          BCRYPT_DIR="$(pwd)/bundle/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt"
          if [ -d "$BCRYPT_DIR" ]; then
            rm -rf "$BCRYPT_DIR"
            TMP=$(mktemp -d)
            pushd "$TMP" > /dev/null
            npm pack bcrypt@6.0.0
            mkdir bcrypt && tar xzf bcrypt-*.tgz --strip-components=1 -C bcrypt
            cd bcrypt && npm install --ignore-scripts && cd ..
            cp -a bcrypt "$BCRYPT_DIR"
            popd > /dev/null
            rm -rf "$TMP"
          fi
          # Use the latest available Node.js 24.x slim image for s390x
          docker run --rm --platform linux/s390x \
            -v "$(pwd)/bundle:/bundle" \
            -w /bundle/programs/server \
            node:24-slim \
            sh -c "apt-get update -qq && apt-get install -y -q build-essential python3 && npm install"

      - name: Clean up and create s390x zip
        run: |
          zip -r wekan-${VERSION}-s390x.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-s390x
          path: wekan-${{ needs.prepare.outputs.version }}-s390x.zip
          retention-days: 1

  # ─── 4b. Build ppc64le bundle (rebuild native modules via QEMU container) ────
  # Meteor 3.5-beta.7 does NOT support ppc64le (installer exits with error on that arch).
  # GitHub Actions has no native ppc64le runners.
  # Solution: QEMU emulation + node:<version>-slim (ppc64le variant) for npm rebuild.
  build-ppc64le:
    needs: [prepare, build-amd64]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      NODE_VERSION: ${{ needs.prepare.outputs.node_version }}
      NODE_VERSION_PPC64LE: ''
    steps:
      - name: Set up QEMU for ppc64le
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ppc64le

      - name: Install unzip/zip
        run: sudo apt-get update && sudo apt-get install -y unzip zip

      - name: Download amd64 bundle
        uses: actions/download-artifact@v8
        with:
          name: bundle-amd64

      - name: Set Node.js version for ppc64le
        id: node_ppc64le
        run: |
          echo "NODE_VERSION_PPC64LE=24" >> $GITHUB_ENV

      - name: Rebuild native modules for ppc64le in container
        run: |
          unzip wekan-${VERSION}-amd64.zip
          rm -rf bundle/programs/server/node_modules
          # Fix: bcrypt 5.0.1 (Meteor accounts-password) ships node-addon-api@3
          # which fails to compile on Node.js 24. Replace with bcrypt 6.0.0.
          BCRYPT_DIR="$(pwd)/bundle/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt"
          if [ -d "$BCRYPT_DIR" ]; then
            rm -rf "$BCRYPT_DIR"
            TMP=$(mktemp -d)
            pushd "$TMP" > /dev/null
            npm pack bcrypt@6.0.0
            mkdir bcrypt && tar xzf bcrypt-*.tgz --strip-components=1 -C bcrypt
            cd bcrypt && npm install --ignore-scripts && cd ..
            cp -a bcrypt "$BCRYPT_DIR"
            popd > /dev/null
            rm -rf "$TMP"
          fi
          # Use the latest available Node.js 24.x slim image for ppc64le
          docker run --rm --platform linux/ppc64le \
            -v "$(pwd)/bundle:/bundle" \
            -w /bundle/programs/server \
            node:24-slim \
            sh -c "apt-get update -qq && apt-get install -y -q build-essential python3 && npm install"

      - name: Clean up and create ppc64le zip
        run: |
          zip -r wekan-${VERSION}-ppc64le.zip bundle

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-ppc64le
          path: wekan-${{ needs.prepare.outputs.version }}-ppc64le.zip
          retention-days: 1

  # ─── 4c. Build armhf bundle — COMMENTED OUT ─────────────────────────────────
  # No official Node.js binaries exist for armhf (arm/v7).
  #build-armhf:
  #  needs: [prepare, build-amd64]
  #  runs-on: ubuntu-latest
  #  timeout-minutes: 120
  #  env:
  #    VERSION: ${{ needs.prepare.outputs.version }}
  #  steps:
