name: wekan
adopt-info: wekan
base: core24
summary: Open Source kanban
description: |
   WeKan ® is an Open Source and collaborative kanban board application.

   Whether you're maintaining a personal todo list, planning your holidays with some friends, or working in a team on your next revolutionary idea, Kanban boards are an unbeatable tool to keep your things organized. They give you a visual overview of the current state of your project, and make you productive by allowing you to focus on the few items that matter the most.
   Depending on target environment, some configuration settings might need to be adjusted.
   For full list of configuration options call:
   $ wekan.help

confinement: strict
grade: stable

# Metadata fields
title: Wekan
contact: https://github.com/wekan/wekan/issues
license: MIT
donation: https://wekan.fi/commercial-support/
issues: https://github.com/wekan/wekan/issues
source-code: https://github.com/wekan/wekan
website: https://wekan.fi

platforms:
  amd64:
    build-on: amd64
    build-for: amd64
  arm64:
    build-on: arm64
    build-for: arm64
  armhf:
    build-on: armhf
    build-for: armhf
  s390x:
    build-on: s390x
    build-for: s390x
  ppc64el:
    build-on: ppc64el
    build-for: ppc64el

plugs:
  mongodb-plug:
    interface: content
    target: $SNAP_DATA/shared

hooks:
  configure:
    plugs:
      - network
      - network-bind

slots:
  mongodb-slot:
    interface: content
    write:
      - $SNAP_DATA/share

apps:
    wekan:
        command: ./bin/wekan-control
        daemon: simple
        plugs: [network, network-bind]

    mongodb:
        command: ./bin/mongodb-control
        daemon: simple
        plugs: [network, network-bind]

    caddy:
        command: ./bin/caddy-control
        daemon: simple
        plugs: [network, network-bind]

    help:
        command: ./bin/wekan-help

    database-backup:
        command: ./bin/mongodb-backup
        plugs: [network, network-bind]

    database-list-backups:
        command: ./bin/database-list-backups

    database-restore:
        command: ./bin/mongodb-restore
        plugs: [network, network-bind]

parts:
    mongodb:
        plugin: nil
        build-packages:
            - wget
            - ca-certificates
            - qemu-user-static
        stage-packages:
            - libssl3
            - libcurl4
            - libstemmer0d
            - zlib1g
            - libsnappy1v5
            - libyaml-cpp0.8
            - libpcre3
            - libpcrecpp0v5
            - libboost-system1.74.0
            - libboost-iostreams1.74.0
            - libboost-filesystem1.74.0
            - libboost-program-options1.74.0
            - libgoogle-perftools4
        override-build: |
            SNAP_ARCH=$(dpkg --print-architecture)
            MONGODB_VERSION="7.0.14"
            mkdir -p "$SNAPCRAFT_PART_INSTALL/bin" "$SNAPCRAFT_PART_INSTALL/usr"

            case "$SNAP_ARCH" in
              amd64)
                wget -q "https://fastdl.mongodb.org/linux/mongodb-linux-x86_64-ubuntu2204-${MONGODB_VERSION}.tgz"
                tar xzf "mongodb-linux-x86_64-ubuntu2204-${MONGODB_VERSION}.tgz" \
                    --strip-components=1 -C "$SNAPCRAFT_PART_INSTALL"
                rm "mongodb-linux-x86_64-ubuntu2204-${MONGODB_VERSION}.tgz"
                wget -q https://downloads.mongodb.com/compass/mongosh-2.8.2-linux-x64.tgz
                tar xzf mongosh-2.8.2-linux-x64.tgz --strip-components=1 -C "$SNAPCRAFT_PART_INSTALL"
                rm mongosh-2.8.2-linux-x64.tgz
                wget -q https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2404-x86_64-100.13.0.tgz
                tar xzf mongodb-database-tools-ubuntu2404-x86_64-100.13.0.tgz \
                    --strip-components=1 -C "$SNAPCRAFT_PART_INSTALL"
                rm mongodb-database-tools-ubuntu2404-x86_64-100.13.0.tgz
                cp /usr/bin/qemu-x86_64-static "$SNAPCRAFT_PART_INSTALL/bin/"
                ;;

              arm64)
                wget -q "https://fastdl.mongodb.org/linux/mongodb-linux-aarch64-ubuntu2204-${MONGODB_VERSION}.tgz"
                tar xzf "mongodb-linux-aarch64-ubuntu2204-${MONGODB_VERSION}.tgz" \
                    --strip-components=1 -C "$SNAPCRAFT_PART_INSTALL"
                rm "mongodb-linux-aarch64-ubuntu2204-${MONGODB_VERSION}.tgz"
                wget -q https://downloads.mongodb.com/compass/mongosh-2.8.2-linux-arm64.tgz
                tar xzf mongosh-2.8.2-linux-arm64.tgz --strip-components=1 -C "$SNAPCRAFT_PART_INSTALL"
                rm mongosh-2.8.2-linux-arm64.tgz
                wget -q https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2404-arm64-100.13.0.tgz
                tar xzf mongodb-database-tools-ubuntu2404-arm64-100.13.0.tgz \
                    --strip-components=1 -C "$SNAPCRAFT_PART_INSTALL"
                rm mongodb-database-tools-ubuntu2404-arm64-100.13.0.tgz
                cp /usr/bin/qemu-aarch64-static "$SNAPCRAFT_PART_INSTALL/bin/"
                ;;

              armhf|s390x|ppc64el)
                apt-get install -y qemu-user-static
                cp /usr/bin/qemu-x86_64-static "$SNAPCRAFT_PART_INSTALL/bin/"
                wget -q "https://fastdl.mongodb.org/linux/mongodb-linux-x86_64-ubuntu2204-${MONGODB_VERSION}.tgz"
                tar xzf "mongodb-linux-x86_64-ubuntu2204-${MONGODB_VERSION}.tgz" \
                    --strip-components=1 -C "$SNAPCRAFT_PART_INSTALL"
                rm "mongodb-linux-x86_64-ubuntu2204-${MONGODB_VERSION}.tgz"

                mv "$SNAPCRAFT_PART_INSTALL/bin/mongod" "$SNAPCRAFT_PART_INSTALL/bin/mongod.x86_64"
                
                printf 'exec "$SNAP/bin/qemu-x86_64-static" -L "$SNAP/lib/x86_64-sysroot" "$SNAP/bin/mongod.x86_64" "$@"\n' \
                    > "$SNAPCRAFT_PART_INSTALL/bin/mongod"
                chmod +x "$SNAPCRAFT_PART_INSTALL/bin/mongod"

                wget -q https://downloads.mongodb.com/compass/mongosh-2.8.2-linux-x64.tgz
                tar xzf mongosh-2.8.2-linux-x64.tgz --strip-components=1 -C "$SNAPCRAFT_PART_INSTALL"
                rm mongosh-2.8.2-linux-x64.tgz
                mv "$SNAPCRAFT_PART_INSTALL/bin/mongosh" "$SNAPCRAFT_PART_INSTALL/bin/mongosh.x86_64"
                printf '#!/bin/sh\nexec "$SNAP/bin/qemu-x86_64-static" -L "$SNAP/lib/x86_64-sysroot" "$SNAP/bin/mongosh.x86_64" "$@"\n' \
                    > "$SNAPCRAFT_PART_INSTALL/bin/mongosh"
                chmod +x "$SNAPCRAFT_PART_INSTALL/bin/mongosh"

                wget -q https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2404-x86_64-100.13.0.tgz
                tar xzf mongodb-database-tools-ubuntu2404-x86_64-100.13.0.tgz \
                    --strip-components=1 -C "$SNAPCRAFT_PART_INSTALL"
                rm mongodb-database-tools-ubuntu2404-x86_64-100.13.0.tgz
                for tool in mongodump mongorestore mongoexport mongoimport \
                            mongostat mongotop mongofiles bsondump; do
                    if [ -f "$SNAPCRAFT_PART_INSTALL/bin/$tool" ]; then
                        mv "$SNAPCRAFT_PART_INSTALL/bin/$tool" \
                           "$SNAPCRAFT_PART_INSTALL/bin/${tool}.x86_64"
                        printf '#!/bin/sh\nexec "$SNAP/bin/qemu-x86_64-static" -L "$SNAP/lib/x86_64-sysroot" "$SNAP/bin/%s.x86_64" "$@"\n' \
                            "$tool" > "$SNAPCRAFT_PART_INSTALL/bin/$tool"
                        chmod +x "$SNAPCRAFT_PART_INSTALL/bin/$tool"
                    fi
                done

                SYSROOT="$SNAPCRAFT_PART_INSTALL/lib/x86_64-sysroot"
                mkdir -p "$SYSROOT"
                dpkg --add-architecture amd64
                apt-get update -qq
                mkdir -p /tmp/amd64-debs
                cd /tmp/amd64-debs
                apt-get download \
                    libc6:amd64 \
                    libstdc++6:amd64 \
                    libgcc-s1:amd64 \
                    libssl3:amd64 \
                    libcurl4:amd64 \
                    zlib1g:amd64 \
                    libsnappy1v5:amd64 \
                    libyaml-cpp0.8:amd64 \
                    libboost-filesystem1.74.0:amd64 \
                    libboost-iostreams1.74.0:amd64 \
                    libboost-program-options1.74.0:amd64 \
                    libboost-system1.74.0:amd64 \
                    2>/dev/null || true
                for deb in /tmp/amd64-debs/*.deb; do
                    [ -f "$deb" ] && dpkg-deb -x "$deb" "$SYSROOT/" || true
                done
                cd "$SNAPCRAFT_PART_INSTALL"
                ;;
            esac
            echo "mongodb" > "$SNAPCRAFT_PART_INSTALL/DATABASE_BACKEND"
        stage:
            - bin
            - usr
            - lib
            - DATABASE_BACKEND
        prime:
            - bin
            - usr
            - lib
            - DATABASE_BACKEND

    wekan:
        source: .
        plugin: npm
        npm-node-version: 22.22.2
        npm-include-node: true
        build-packages:
            - build-essential
            - ca-certificates
            - apt-utils
            - python3
            - g++
            - capnproto
            - curl
            - wget
            - unzip
            - execstack
            - nodejs
            - npm
            - git
        stage-packages:
            - libfontconfig1
        override-build: |
            rm -rf .build
            # Haetaan versio package.jsonista
            RAW_VERSION=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
            # Siivotaan versio: poistetaan 'v' alusta ja '.0' lopusta (esim. 8.44.0 -> 8.44)
            # Wekan julkaisu-URLit ja tiedostonimet eivät käytä .0-päätettä.
            CLEAN_VERSION=$(echo $RAW_VERSION | sed 's/^v//' | sed 's/\.0$//')
            snapcraftctl set-version "${CLEAN_VERSION}"
            SNAP_ARCH=$(dpkg --print-architecture)
            case "$SNAP_ARCH" in
              amd64)   WEKAN_ARCH="amd64"   NODE_ARCH="x64"     ;;
              arm64)   WEKAN_ARCH="arm64"   NODE_ARCH="arm64"   ;;
              armhf)   WEKAN_ARCH="armhf"   NODE_ARCH="armv7l"  ;;
              ppc64el) WEKAN_ARCH="ppc64le" NODE_ARCH="ppc64le" ;;
              s390x)   WEKAN_ARCH="s390x"   NODE_ARCH="s390x"   ;;
              *) echo "Unsupported snap architecture: $SNAP_ARCH"; exit 1 ;;
            esac
            mkdir .build
            cd .build
            # Käytetään siivottua versiota URL-osoitteessa ja tiedostonimessä
            wget -q "https://github.com/wekan/wekan/releases/download/v${CLEAN_VERSION}/wekan-${CLEAN_VERSION}-${WEKAN_ARCH}.zip"
            unzip -q "wekan-${CLEAN_VERSION}-${WEKAN_ARCH}.zip"
            (cd bundle && npm install -g npm@10 && npm install --no-audit && npm install @babel/parser underscore)
            rm "wekan-${CLEAN_VERSION}-${WEKAN_ARCH}.zip"
            cd ..
            NODE_VERSION="22.22.2"
            wget -q https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-${NODE_ARCH}.tar.gz
            tar -xf node-v${NODE_VERSION}-linux-${NODE_ARCH}.tar.gz \
              node-v${NODE_VERSION}-linux-${NODE_ARCH}/bin/node
            rm node-v${NODE_VERSION}-linux-${NODE_ARCH}.tar.gz
            mkdir -p $SNAPCRAFT_PART_INSTALL/bin
            cp -p node-v${NODE_VERSION}-linux-${NODE_ARCH}/bin/node $SNAPCRAFT_PART_INSTALL/bin/
            rm -rf node-v${NODE_VERSION}-linux-${NODE_ARCH}
            cp -r .build/bundle/* $SNAPCRAFT_PART_INSTALL/
            cp .build/bundle/.node_version.txt $SNAPCRAFT_PART_INSTALL/
            rm -f $SNAPCRAFT_PART_INSTALL/lib/node_modules/wekan
            echo "Cloning migratemongo (CPU-feature QEMU wrappers)..."
            git clone https://github.com/wekan/migratemongo.git
            cp -pR migratemongo "$SNAPCRAFT_PART_INSTALL/"
            rm -rf migratemongo
        organize:
            README: README.wekan
        prime:
            - -lib/node_modules/node-pre-gyp/node_modules/tar/lib/.unpack.js.swp
            - -lib/node_modules/weka*

    helpers:
        source: snap-src
        plugin: dump

    caddy:
        plugin: nil
        build-packages:
            - debian-keyring
            - debian-archive-keyring
            - apt-transport-https
            - gnupg
            - curl
        override-build: |
            echo "Installing Caddy 2 from the official repository..."
            curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /tmp/caddy-stable-archive-keyring.gpg
            mkdir -p /etc/apt/keyrings
            cp /tmp/caddy-stable-archive-keyring.gpg /etc/apt/keyrings/
            echo "deb [signed-by=/etc/apt/keyrings/caddy-stable-archive-keyring.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main" > /etc/apt/sources.list.d/caddy-stable.list
            apt update
            apt -y install caddy
            mkdir -p $SNAPCRAFT_PART_INSTALL/bin
            cp /usr/bin/caddy $SNAPCRAFT_PART_INSTALL/bin/
            chmod +x $SNAPCRAFT_PART_INSTALL/bin/caddy
            mkdir -p $SNAPCRAFT_PART_INSTALL/license
            echo "Caddy is licensed under the Apache License 2.0." > $SNAPCRAFT_PART_INSTALL/license/CADDY_LICENSE
            mkdir -p $SNAPCRAFT_PART_INSTALL/etc
            printf ":8080 {\n    reverse_proxy localhost:3000\n}\n" > $SNAPCRAFT_PART_INSTALL/etc/Caddyfile
        stage:
            - bin/caddy
            - license/CADDY_LICENSE
            - etc/Caddyfile
