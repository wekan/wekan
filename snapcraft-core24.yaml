# ─────────────────────────────────────────────────────────────────────────────
# snapcraft-core24.yaml — WeKan snap for the STABLE channel.
#
# The main snapcraft.yaml uses `base: core26`, which (until core26 is released as
# stable) requires `build-base: devel` + `grade: devel`, so it can only be pushed
# to the Snap Beta/Edge channels. This file is the SAME newest WeKan (Meteor 3.5,
# Node.js 24, FerretDB v1, MongoDB 7, Caddy 2) built on `base: core24`, which is a
# released base, so it can be `grade: stable` and pushed to the Snap STABLE channel.
#
# To build the stable snap, use this file in place of snapcraft.yaml, e.g.:
#     cp snapcraft-core24.yaml snapcraft.yaml && snapcraft ...
# Keep it in sync with snapcraft.yaml — the only intended differences are:
#   base: core24  (not core26) · no build-base: devel · grade: stable
# ─────────────────────────────────────────────────────────────────────────────
name: wekan
version: '9.82'
base: core24
confinement: strict
grade: stable
summary: Open Source kanban
description: |
   WeKan ® is an Open Source and collaborative kanban board application.

   Whether you're maintaining a personal todo list, planning your holidays with some friends,
   or working in a team on your next revolutionary idea, Kanban boards are an unbeatable tool
   to keep your things organized. They give you a visual overview of the current state of
   your project, and make you productive by allowing you to focus on the few items that matter the most.
   Depending on target environment, some configuration settings might need to be adjusted.
   For full list of configuration options call:
   $ wekan.help

# Metadata fields
title: Wekan
contact: https://github.com/wekan/wekan/issues
license: MIT
donation: https://wekan.fi/commercial-support/
issues: https://github.com/wekan/wekan/issues
source-code: https://github.com/wekan/wekan
website: https://wekan.fi

environment:
  SNAP_DATA: "/var/snap/$SNAP_INSTANCE_NAME/$SNAP_REVISION"
  SNAP_COMMON: "/var/snap/$SNAP_INSTANCE_NAME/common"
  SNAP: "/snap/$SNAP_INSTANCE_NAME/$SNAP_REVISION"

# core24 uses the platforms: key (snapcraft 8), same as core26.
platforms:
  amd64:
    build-on: amd64
    build-for: amd64
  arm64:
    build-on: arm64
    build-for: arm64

plugs:
  mongodb-plug:
    interface: content
    target: $SNAP_DATA/shared

hooks:
  configure:
    plugs:
      - network
      - network-bind

slots:
  mongodb-slot:
    interface: content
    write:
      - $SNAP_DATA/share

apps:
    wekan:
        command: ./bin/wekan-control
        daemon: simple
        plugs: [network, network-bind]
        after: [mongodb, ferretdb]

    mongodb:
        command: ./bin/mongodb-control
        daemon: simple
        plugs: [network, network-bind]

    # Alternative MongoDB-compatible database: FerretDB v1 (the wekan/FerretDB
    # fork) with its embedded SQLite backend. Only one of mongodb / ferretdb runs
    # at a time; switch with `snap set wekan database=ferretdb` (the configure
    # hook stops mongod and starts this, and vice-versa). The ferretdb binary is
    # shipped inside the WeKan bundle (staged to $SNAP/ferretdb by the wekan part).
    ferretdb:
        command: ./bin/ferretdb-control
        daemon: simple
        plugs: [network, network-bind]

    caddy:
        command: ./bin/caddy-control
        daemon: simple
        plugs: [network, network-bind]
        after: [mongodb]

    help:
        command: ./bin/wekan-help

    database-backup:
        command: ./bin/mongodb-backup
        plugs: [network, network-bind]

    database-list-backups:
        command: ./bin/database-list-backups

    database-restore:
        command: ./bin/mongodb-restore
        plugs: [network, network-bind]


parts:
    mongodb:
        plugin: nil
        #source: https://fastdl.mongodb.org/linux/mongodb-linux-x86_64-ubuntu2204-7.0.34.tgz
        stage-packages:
            - libssl3
            - libcurl4
            - libstemmer0d
            - zlib1g
            - libsnappy1v5
            - libyaml-cpp0.8
            - libpcre2-8-0
            - libpcre2-posix3
            - libboost-system1.83.0
            - libboost-iostreams1.83.0
            - libboost-filesystem1.83.0
            - libboost-program-options1.83.0
            - libgoogle-perftools4
        override-build: |
            set -eu
            case "${CRAFT_ARCH_BUILD_FOR}" in
                amd64) MONGO_ARCH="x86_64" ;;
                arm64) MONGO_ARCH="aarch64" ;;
                *) echo "Unsupported architecture: ${CRAFT_ARCH_BUILD_FOR}"; exit 1 ;;
            esac
            MONGO_URL="https://fastdl.mongodb.org/linux/mongodb-linux-${MONGO_ARCH}-ubuntu2204-7.0.34.tgz"
            wget -O mongodb.tgz "$MONGO_URL"
            tar -xzf mongodb.tgz --strip-components=1
            mkdir -p "$SNAPCRAFT_PART_INSTALL/bin"
            cp -a bin/* "$SNAPCRAFT_PART_INSTALL/bin/"
        stage:
            - bin
            - usr
        prime:
            - bin
            - usr

    mongosh:
        plugin: nil
        #source: https://downloads.mongodb.com/compass/mongosh-2.8.2-linux-x64.tgz
        override-build: |
            set -eu
            case "${CRAFT_ARCH_BUILD_FOR}" in
                amd64) MONGOSH_ARCH="x64" ;;
                arm64) MONGOSH_ARCH="arm64" ;;
                *) echo "Unsupported architecture: ${CRAFT_ARCH_BUILD_FOR}"; exit 1 ;;
            esac
            MONGOSH_URL="https://downloads.mongodb.com/compass/mongosh-2.8.2-linux-${MONGOSH_ARCH}.tgz"
            wget -O mongosh.tgz "$MONGOSH_URL"
            tar -xzf mongosh.tgz --strip-components=1
            mkdir -p "$SNAPCRAFT_PART_INSTALL/bin"
            cp -a bin/* "$SNAPCRAFT_PART_INSTALL/bin/"

    mongotools:
        plugin: nil
        #source: https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-100.16.0.tgz
        override-build: |
            set -eu
            case "${CRAFT_ARCH_BUILD_FOR}" in
                amd64) TOOLS_ARCH="x86_64" ;;
                arm64) TOOLS_ARCH="arm64" ;;
                *) echo "Unsupported architecture: ${CRAFT_ARCH_BUILD_FOR}"; exit 1 ;;
            esac
            TOOLS_URL="https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-${TOOLS_ARCH}-100.16.0.tgz"
            wget -O mongotools.tgz "$TOOLS_URL"
            tar -xzf mongotools.tgz --strip-components=1
            mkdir -p "$SNAPCRAFT_PART_INSTALL/bin"
            cp -a bin/* "$SNAPCRAFT_PART_INSTALL/bin/"

    # Old mongod (MongoDB 3.2, amd64 only), used ONLY to read the WeKan 6.09 snap's
    # MongoDB 3.2 data during the one-time migration to FerretDB: migration-control
    # falls back to $SNAP/bin/mongod-old when mongod 7 cannot open the data. arm64
    # snaps run newest WeKan on MongoDB 7 (whose data mongod 7 reads directly), so
    # no old mongod is staged there.
    # NOTE: mongod 3.2 is a 2016 binary linked against old glibc/OpenSSL, so on a
    # modern base it may need extra runtime libraries; this fallback is best-effort
    # and must be tested against a real 6.09 data directory.
    mongodb-old:
        plugin: nil
        override-build: |
            set -eu
            case "${CRAFT_ARCH_BUILD_FOR}" in
                amd64)
                    wget -O mongodb-old.tgz "https://fastdl.mongodb.org/linux/mongodb-linux-x86_64-3.2.22.tgz"
                    tar -xzf mongodb-old.tgz --strip-components=1
                    mkdir -p "$SNAPCRAFT_PART_INSTALL/bin"
                    cp -a bin/mongod "$SNAPCRAFT_PART_INSTALL/bin/mongod-old"
                    ;;
                *)
                    echo "No old mongod for ${CRAFT_ARCH_BUILD_FOR}; MongoDB 7 (mongodb part) reads its data."
                    ;;
            esac


    wekan:
        source: .
        plugin: npm
        npm-node-version: 24.18.0
        npm-include-node: true
        build-packages:
            - build-essential
            - ca-certificates
            - apt-utils
            - python3
            - g++
            - capnproto
            - curl
            - wget
            - unzip
            - nodejs
            - npm
        stage-packages:
            - libfontconfig1
        override-build: |
            set -eu
            case "${CRAFT_ARCH_BUILD_FOR}" in
                amd64)
                    WEKAN_ARCH="amd64"
                    NODE_ARCH="x64"
                    ;;
                arm64)
                    WEKAN_ARCH="arm64"
                    NODE_ARCH="arm64"
                    ;;
                *)
                    echo "Unsupported architecture: ${CRAFT_ARCH_BUILD_FOR}"
                    exit 1
                    ;;
            esac
            WEKAN_ZIP="wekan-9.82-${WEKAN_ARCH}.zip"
            NODE_TAR="node-v24.17.0-linux-${NODE_ARCH}.tar.xz"
            echo "Cleaning environment first"
            rm -rf .build
            mkdir .build
            cd .build
            #wget https://github.com/wekan/wekan/releases/download/v9.82/wekan-9.82-amd64.zip
            wget "https://github.com/wekan/wekan/releases/download/v9.82/${WEKAN_ZIP}"
            unzip "${WEKAN_ZIP}"
            rm "${WEKAN_ZIP}"
            # Fix: bcrypt 5.0.1 (Meteor accounts-password) ships node-addon-api@3
            # which fails to compile on Node.js 24. Replace with bcrypt 6.0.0.
            BCRYPT_DIR="bundle/programs/server/npm/node_modules/meteor/accounts-password/node_modules/bcrypt"
            if [ -d "$BCRYPT_DIR" ]; then
              rm -rf "$BCRYPT_DIR"
              TMP=$(mktemp -d)
              pushd "$TMP" > /dev/null
              npm pack bcrypt@6.0.0
              mkdir bcrypt && tar xzf bcrypt-*.tgz --strip-components=1 -C bcrypt
              cd bcrypt && npm install --ignore-scripts && cd ..
              popd > /dev/null
              cp -a "$TMP/bcrypt" "$BCRYPT_DIR"
              rm -rf "$TMP"
            fi
            cd bundle/programs/server
            rm -rf node_modules
            npm install
            cd ../../../..
            # Copy to Snap
            #wget https://nodejs.org/dist/v24.17.0/node-v24.17.0-linux-x64.tar.xz
            wget "https://nodejs.org/dist/v24.17.0/${NODE_TAR}"
            tar -xf "${NODE_TAR}" "node-v24.17.0-linux-${NODE_ARCH}/bin/node"
            rm "${NODE_TAR}"
            mkdir $SNAPCRAFT_PART_INSTALL/bin
            cp -p "node-v24.17.0-linux-${NODE_ARCH}/bin/node" $SNAPCRAFT_PART_INSTALL/bin/
            rm -rf "node-v24.17.0-linux-${NODE_ARCH}"
            cp -r .build/bundle/* $SNAPCRAFT_PART_INSTALL/
            cp .build/bundle/.node_version.txt $SNAPCRAFT_PART_INSTALL/
            rm -f $SNAPCRAFT_PART_INSTALL/lib/node_modules/wekan
            # The .zip bundle now ships a self-contained launcher + its own Node.js
            # (for the offline downloads); the snap has its own node in bin/ and uses
            # wekan-control, so drop the redundant bundled node + launchers. The
            # bundled ferretdb is kept (ferretdb-control runs $SNAP/ferretdb).
            rm -f $SNAPCRAFT_PART_INSTALL/node \
                  $SNAPCRAFT_PART_INSTALL/start-wekan.sh \
                  $SNAPCRAFT_PART_INSTALL/start-wekan.bat
            # Bundle the MongoDB -> FerretDB migrator (run by migration-control on
            # first boot when upgrading from an old MongoDB-based snap).
            cp releases/migrate-mongodb-to-ferretdb.mjs $SNAPCRAFT_PART_INSTALL/bin/

        organize:
            README: README.wekan
        #prime:
        #    - -lib/node_modules/node-pre-gyp/node_modules/tar/lib/.unpack.js.swp
        #    - -lib/node_modules/weka*

    helpers:
        source: snap-src
        plugin: dump

    caddy:
        plugin: nil
        build-packages:
            - debian-keyring
            - debian-archive-keyring
            - apt-transport-https
            - gnupg
            - curl
        override-build: |
            # Add Caddy repository
            echo "Installing Caddy 2 from the official repository..."
            curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /tmp/caddy-stable-archive-keyring.gpg
            mkdir -p /etc/apt/keyrings
            cp /tmp/caddy-stable-archive-keyring.gpg /etc/apt/keyrings/
            echo "deb [signed-by=/etc/apt/keyrings/caddy-stable-archive-keyring.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main" > /etc/apt/sources.list.d/caddy-stable.list
            apt update
            apt -y install caddy

            # Display installed Caddy version for confirmation
            echo "Installed Caddy version:"
            /usr/bin/caddy version

            # Create directory structure in the snap
            mkdir -p $SNAPCRAFT_PART_INSTALL/bin

            # Copy Caddy binary
            cp /usr/bin/caddy $SNAPCRAFT_PART_INSTALL/bin/
            chmod +x $SNAPCRAFT_PART_INSTALL/bin/caddy

            # Create license files manually since they don't exist in the package
            mkdir -p $SNAPCRAFT_PART_INSTALL/license
            echo "Caddy is licensed under the Apache License 2.0. See https://github.com/caddyserver/caddy/blob/master/LICENSE" > $SNAPCRAFT_PART_INSTALL/license/CADDY_LICENSE

            # Create a basic default Caddyfile for the snap
            mkdir -p $SNAPCRAFT_PART_INSTALL/etc
            cat > $SNAPCRAFT_PART_INSTALL/etc/Caddyfile << 'EOF'
            # Default Caddyfile for Wekan
            # This is loaded by caddy-control script if no other config is provided

            :8080 {
                reverse_proxy localhost:3000
            }
            EOF
        stage:
            - bin/caddy
            - license/CADDY_LICENSE
            - etc/Caddyfile
