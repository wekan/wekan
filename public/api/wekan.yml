        Only the global admin can call this. The request body may
         contain any of `orgSharedTemplates`, `orgPropagateMembersToBoards` and
         `orgSyncMembersFromAuth` (booleans); only those whitelisted fields are
         `$set` on the organization. Returns the updated organization.
      tags:
        - Org
        - Organizations
      consumes:
        - multipart/form-data
        - application/json
      parameters:
        - name: org
          in: path
          description: |
            the ID of the organization
          type: string
          required: true
      produces:
