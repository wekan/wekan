swagger: '2.0'
info:
  title: Wekan REST API
  version: v9.71
  description: |
    The REST API allows you to control and extend Wekan with ease.

    If you are an end-user and not a dev or a tester, [create an issue](https://github.com/wekan/wekan/issues/new) to request new APIs.

    > All API calls in the documentation are made using `curl`.  However, you are free to use Java / Python / PHP / Golang / Ruby / Swift / Objective-C / Rust / Scala / C# or any other programming languages.

    # Production Security Concerns
    When calling a production Wekan server, ensure it is running via HTTPS and has a valid SSL Certificate. The login method requires you to post your username and password in plaintext, which is why we highly suggest only calling the REST login api over HTTPS. Also, few things to note:

    * Only call via HTTPS
    * Implement a timed authorization token expiration strategy
    * Ensure the calling user only has permissions for what they are calling and no more

schemes:
  - http

securityDefinitions:
  UserSecurity:
    type: apiKey
    in: header
    name: Authorization

paths:
  /users/login:
    post:
      operationId: login
      summary: Login with REST API
      consumes:
        - application/json
        - application/x-www-form-urlencoded
      tags:
        - Login
      parameters:
        - name: loginRequest
          in: body
          required: true
          description: Login credentials
          schema:
            type: object
            required:
              - username
              - password
            properties:
              username:
                description: |
                  Your username
                type: string
              password:
                description: |
                  Your password
                type: string
                format: password
      responses:
        200:
          description: |-
            Successful authentication
          schema:
            type: object
            required:
              - id
              - token
              - tokenExpires
            properties:
              id:
                type: string
                description: User ID
              token:
                type: string
                description: |
                  Authentication token
              tokenExpires:
                type: string
                format: date-time
                description: |
                  Token expiration date
        400:
          description: |
            Error in authentication
          schema:
            type: object
            properties:
              error:
                type: string
              reason:
                type: string
        default:
          description: |
            Error in authentication
  /users/register:
    post:
      operationId: register
      summary: Register with REST API
      description: |
        Notes:
          - You will need to provide the token for any of the authenticated methods.
      consumes:
        - application/x-www-form-urlencoded
        - application/json
      tags:
        - Login
      parameters:
        - name: username
          in: formData
          required: true
          description: |
            Your username
          type: string
        - name: password
          in: formData
          required: true
          description: |
            Your password
          type: string
          format: password
        - name: email
          in: formData
          required: true
          description: |
            Your email
          type: string
      responses:
        200:
          description: |-
            Successful registration
          schema:
            items:
              properties:
                id:
                  type: string
                token:
                  type: string
                tokenExpires:
                  type: string
        400:
          description: |
            Error in registration
          schema:
            items:
              properties:
                error:
                  type: number
                reason:
                  type: string
        default:
          description: |
            Error in registration

  /api/admin/attachment-settings:
    get:
      operationId: get_attachment_settings
      summary: Get the attachment storage / upload-block settings (GlobalAdmin)
      description: |
        Only the global admin can call this. Returns the Admin Panel >
         Attachments settings document, including `limitSettings.attachmentsUploadBlocked`
         and `limitSettings.avatarsUploadBlocked` plus the size limits. Cloud-storage
         secret keys (S3 secretAccessKey, Azure accountKey/connectionString, GCS
         credentials) are masked and never returned; a boolean `<field>Set` marker
         shows whether a value exists.
      tags:
        - AttachmentStorageSettings
        - Settings
      produces:
        - application/json
      security:
          - UserSecurity: []
      responses:
        '200':
          description: |-
            200 response
          schema:
            type: Object
    put:
      operationId: update_attachment_settings
      summary: Update the attachment storage / upload-block settings (GlobalAdmin)
      description: |
        Only the global admin can call this. The request body is a
         partial settings object (for example
         `{"limitSettings": {"avatarsUploadBlocked": true}}`). It is applied through
         the same update path as the `updateAttachmentStorageSettings` Meteor method,
         so validation and `$set` semantics are identical: cloud-storage secrets left
         blank are preserved. The masked, updated settings document is returned.
      tags:
        - AttachmentStorageSettings
        - Settings
      consumes:
        - multipart/form-data
        - application/json
      parameters:
      produces:
        - application/json
      security:
          - UserSecurity: []
      responses:
        '200':
          description: |-
            200 response
          schema:
            type: Object
  /api/admin/domains:
    get:
      operationId: get_admin_domains
      summary: List email domains with their user counts (GlobalAdmin)
      description: |
        Only the global admin can call this. Counts every user by the
         domain part of their primary email address (the first address in `emails`),
         mirroring the Admin Panel > People domain grouping. Domains are returned
         sorted by descending count, then alphabetically.
      tags:
        - Users
        - Users
      produces:
        - application/json
      security:
          - UserSecurity: []
      responses:
        '200':
          description: |-
            200 response
          schema:
            type: array
            items:
              type: object
              properties:
                domain:
                  type: string
                count:
                  type: number
