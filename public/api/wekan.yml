                color:
                  type: string
                icon:
                  type: string
    post:
      operationId: new_card_dependency
      summary: Add (or update) a typed dependency line from a card to another card
      description: |
        The target card must be on the same board. If the dependency
         already exists, its type/color/icon are updated.
      tags:
        - Dependencies
      consumes:
        - multipart/form-data
        - application/json
      parameters:
        - name: cardId
          in: formData
          description: |
            the source card ID
          type: string
          required: true
        - name: dependsOn
          in: formData
          description: the dependsOn value
          type: string
          required: true
        - name: type
          in: formData
          description: |
            relation type: related-to | blocks | is-blocked-by | fixes | is-fixed-by
          type: string
          required: false
        - name: color
          in: formData
          description: |
            line/badge color, any CSS color e.g. "#eb144c"
          type: string
          required: false
        - name: icon
          in: formData
          description: |
            FontAwesome icon name without the "fa-" prefix
          type: string
          required: false
        - name: board
          in: path
          description: |
            the board ID
          type: string
          required: true
        - name: card
          in: path
          description: |
            the source card ID
          type: string
          required: true
      produces:
