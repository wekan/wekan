  /api/boards/{board}/domains:
    get:
      operationId: get_board_domains
      summary: Get the email domains a board is shared with
      description: |
        #5850: returns the `domains` array of a board. Each entry is an
         object `{ domain: "example.com", isActive: true }`. Anyone able to read the
         board may list its domains. Requires the caller to be authenticated.
      tags:
        - Boards
        - Boards
      parameters:
        - name: board
          in: path
          description: |
            the board ID
          type: string
          required: true
      produces:
        - application/json
      security:
          - UserSecurity: []
      responses:
        '200':
          description: |-
            200 response
          schema:
            type: array
            items:
              type: object
              properties:
                domain:
                  type: string
                isActive:
                  type: boolean
    post:
      operationId: add_board_domain
      summary: Share a board with an email domain
      description: |
        #5850: add a single email domain to a board's `domains` array
         with `isActive: true`, leaving any existing domains in place. The domain is
         trimmed and lowercased and must look like a domain (contain a '.', no '@' and
         no whitespace); it is added only if not already present. Requires the caller
         to be a board admin (or site admin). Returns the updated domains array.
      tags:
        - Boards
        - Boards
      consumes:
        - multipart/form-data
        - application/json
      parameters:
        - name: domain
          in: formData
          description: |
            the email domain to add, e.g. "example.com"
          type: string
          required: true
        - name: board
          in: path
          description: |
            the board ID
          type: string
          required: true
      produces:
        - application/json
      security:
          - UserSecurity: []
      responses:
        '200':
          description: |-
            200 response
          schema:
            type: array
            items:
              type: object
              properties:
                domain:
                  type: string
                isActive:
                  type: boolean
  /api/boards/{board}/domains/{domain}:
    delete:
      operationId: delete_board_domain
      summary: Stop sharing a board with an email domain
      description: |
        #5850: remove a single email domain from a board's `domains`
         array. The domain in the path is trimmed and lowercased before matching.
         Requires the caller to be a board admin (or site admin). Returns the updated
         domains array.
      tags:
        - Boards
        - Boards
      parameters:
        - name: board
          in: path
          description: |
            the board ID
          type: string
          required: true
        - name: domain
          in: path
          description: |
            the email domain to remove, e.g. "example.com"
          type: string
          required: true
      produces:
        - application/json
      security:
          - UserSecurity: []
      responses:
        '200':
          description: |-
            200 response
          schema:
            type: array
            items:
              type: object
              properties:
                domain:
                  type: string
                isActive:
                  type: boolean
